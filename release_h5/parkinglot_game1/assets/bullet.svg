<svg xmlns="http://www.w3.org/2000/svg" viewBox="218 0 98 36" width="98" height="36">
  <title>anime energy shot</title>
  <defs>
    <linearGradient id="trMain" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#fff9e0" stop-opacity="0"/>
      <stop offset="18%" stop-color="#ffe066" stop-opacity="0.38"/>
      <stop offset="42%" stop-color="#ffcc33" stop-opacity="0.78"/>
      <stop offset="72%" stop-color="#ffb020" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#fff8e8" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="trGlow" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#fff3bf" stop-opacity="0"/>
      <stop offset="38%" stop-color="#ffd43b" stop-opacity="0.58"/>
      <stop offset="88%" stop-color="#ffe873" stop-opacity="0.52"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="headCore" cx="45%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#fffaf0"/>
      <stop offset="100%" stop-color="#ffb347" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="headHot" cx="40%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- 拖尾再减半；纵向约为原先 1/3（±7→≈±2.3） -->
    <filter id="blurSoft" x="-10%" y="-100%" width="120%" height="300%">
      <feGaussianBlur stdDeviation="0.85" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="blurTrail" x="-8%" y="-120%" width="116%" height="340%">
      <feGaussianBlur stdDeviation="1.15" result="t"/>
      <feMerge>
        <feMergeNode in="t"/>
      </feMerge>
    </filter>
  </defs>
  <path
    d="M 218 18 L 274 15.67 L 286 18 L 274 20.33 L 218 18 Z"
    fill="url(#trGlow)"
    filter="url(#blurTrail)"
    opacity="0.92"/>
  <path
    d="M 220 18 L 275 15.67 L 286 18 L 275 20.33 L 220 18 Z"
    fill="url(#trMain)"
    filter="url(#blurSoft)"/>
  <ellipse cx="298" cy="18" rx="6" ry="3.7" fill="url(#headCore)" opacity="0.98"/>
  <ellipse cx="303" cy="18" rx="2.4" ry="1.6" fill="url(#headHot)"/>
  <circle cx="307" cy="18" r="1.05" fill="#ffffff"/>
</svg>
