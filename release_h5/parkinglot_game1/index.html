<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>最强大脑6 · 箭头突围</title>
  <style>
    html { height: 100%; touch-action: manipulation; }
    /** 页面背景：水泥路面 — 冷灰基调 + 细密纹理 + 轻微磨损明暗 */
    html, body {
      margin: 0;
      padding: 0;
      color: #1a2428;
      font-family: system-ui, "PingFang SC", "Microsoft YaHei", sans-serif;
      background-color: #6f7378;
      background-image:
        radial-gradient(ellipse 140% 55% at 50% -5%, rgba(255, 255, 255, 0.11), transparent 52%),
        radial-gradient(ellipse 70% 45% at 92% 88%, rgba(0, 0, 0, 0.14), transparent 48%),
        radial-gradient(ellipse 50% 35% at 8% 75%, rgba(0, 0, 0, 0.07), transparent 45%),
        repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.028),
          rgba(255, 255, 255, 0.028) 1px,
          transparent 1px,
          transparent 4px
        ),
        repeating-linear-gradient(
          90deg,
          rgba(0, 0, 0, 0.022),
          rgba(0, 0, 0, 0.022) 1px,
          transparent 1px,
          transparent 5px
        ),
        linear-gradient(172deg, #8e9399 0%, #787d83 32%, #696e74 68%, #5f646a 100%);
      background-attachment: fixed;
    }
    body {
      min-height: 100%;
      padding: max(10px, env(safe-area-inset-top)) 10px max(14px, env(safe-area-inset-bottom));
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .header {
      width: min(96vw, 420px);
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }
    button.gear {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(145deg, #a855f7, #7c3aed);
      border: 2px solid rgba(255,255,255,.35);
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
      display: grid; place-items: center;
      font-size: 18px;
      cursor: pointer;
      padding: 0;
      margin: 0;
      font-family: inherit;
      color: inherit;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }
    button.gear:active { filter: brightness(1.06); transform: scale(0.96); }
    .banner {
      text-align: center;
      background: linear-gradient(180deg, #ffe066 0%, #fcc419 100%);
      border-radius: 10px;
      padding: 6px 12px;
      border: 2px solid #fab005;
      box-shadow: 0 3px 0 #e67700;
      font-weight: 800;
      font-size: 15px;
      color: #5c3d00;
    }
    .coins {
      display: flex; align-items: center; gap: 4px;
      background: rgba(255,255,255,.65);
      padding: 4px 10px;
      border-radius: 999px;
      font-weight: 700;
      border: 1px solid rgba(0,0,0,.08);
    }
    .coins span { color: #c92a2a; }
    .progressWrap {
      width: min(96vw, 420px);
      height: 10px;
      background: rgba(255,255,255,.5);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,.1);
    }
    .progressFill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #51cf66, #2f9e44);
      border-radius: 999px;
      transition: width .175s ease;
    }
    .targetWrap {
      width: min(92vw, 380px);
      aspect-ratio: 1;
      background: rgba(255,255,255,.35);
      border-radius: 14px;
      padding: 8px;
      box-sizing: border-box;
      border: 3px solid rgba(255,255,255,.7);
      box-shadow: inset 0 2px 12px rgba(0,0,0,.08), 0 4px 14px rgba(0,0,0,.12);
    }
    .targetGrid {
      width: 100%; height: 100%;
      display: grid;
      gap: 1px;
      border-radius: 8px;
      overflow: hidden;
      touch-action: none;
    }
    .tgCell {
      position: relative;
      border-radius: 2px;
      box-shadow: inset 0 -1px rgba(0,0,0,.12);
    }
    .tgCell.empty { opacity: .12; background: #fff !important; }
    .tgCell.tgGravityMoving {
      position: relative;
      z-index: 4;
      pointer-events: none;
    }
    .middleZone {
      width: min(96vw, 420px);
      /** 与上方 targetWrap：body 列 gap 8px + 本 margin；总间距较「8+31」再 +20% → margin-top 39px */
      margin-top: 39px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }
    .middleParkRow {
      display: flex;
      flex-direction: row;
      align-items: stretch;
      gap: 8px;
      width: 100%;
    }
    .parkGrid {
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      grid-auto-rows: auto;
      gap: 4px;
      padding: 8px 8px 8px 8px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 12px;
      border: 2px dashed rgba(0, 0, 0, 0.12);
      box-sizing: border-box;
      box-shadow: inset 0 1px 8px rgba(0, 0, 0, 0.06);
      flex: 1;
      min-width: 0;
    }
    .quotaAside {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      gap: 0;
      flex-shrink: 0;
      width: 52px;
      align-self: stretch;
    }
    .parkBay {
      aspect-ratio: 1;
      min-height: 0;
      width: 100%;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.4);
      border: 2px solid rgba(0, 0, 0, 0.1);
      box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.07);
      transition: box-shadow 0.1s ease, border-color 0.1s ease;
    }
    .parkBay.destGlow {
      border-color: #2f9e44;
      box-shadow: inset 0 0 0 2px rgba(47, 158, 68, 0.55), 0 0 14px rgba(81, 207, 102, 0.35);
    }
    /** 未解锁停车位（占位）：尺寸与 8 格布局下单格一致，不可入库 */
    .parkBay.parkBay-locked {
      opacity: 0.4;
      pointer-events: none;
      background: repeating-linear-gradient(
        -12deg,
        rgba(255, 255, 255, 0.22),
        rgba(255, 255, 255, 0.22) 6px,
        rgba(0, 0, 0, 0.04) 6px,
        rgba(0, 0, 0, 0.04) 12px
      );
      border-style: dashed;
    }
    .parkBay-occupied {
      padding: 2px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      gap: 0;
      min-height: 0;
      /** 去掉默认槽位的内阴影，避免与半透明底色叠加出白条；裁剪子像素接缝 */
      box-shadow: none;
      overflow: hidden;
      isolation: isolate;
    }
    /** 单层渐变底（不再叠白色底层，杜绝接缝露白）；约 70% 不透明 */
    .parkBay.parkBay-occupied.c0 {
      background: linear-gradient(165deg, rgba(255, 107, 107, 0.72), rgba(201, 42, 42, 0.68));
    }
    .parkBay.parkBay-occupied.c1 {
      background: linear-gradient(165deg, rgba(105, 219, 124, 0.72), rgba(47, 158, 68, 0.68));
    }
    .parkBay.parkBay-occupied.c2 {
      background: linear-gradient(165deg, rgba(116, 192, 252, 0.72), rgba(25, 113, 194, 0.68));
    }
    .parkBay.parkBay-occupied.c3 {
      background: linear-gradient(165deg, rgba(255, 212, 59, 0.74), rgba(240, 140, 0, 0.68));
    }
    .parkBay.parkBay-occupied.c4 {
      background: linear-gradient(165deg, rgba(218, 119, 242, 0.72), rgba(156, 54, 181, 0.66));
    }
    .parkBay.parkBay-occupied.c5 {
      background: linear-gradient(165deg, rgba(94, 234, 212, 0.72), rgba(13, 148, 136, 0.68));
    }
    /** 卡通炮塔：内联 SVG + 炮管绕底座旋转瞄准（动画由 transition + 轻微 idle） */
    .parkTurretWrap {
      position: relative;
      flex: 0 0 auto;
      width: 84%;
      max-height: 46%;
      margin: 0 auto;
      align-self: center;
      pointer-events: none;
      animation: parkTurretIdle 2.5s ease-in-out infinite;
    }
    @keyframes parkTurretIdle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-1.5px); }
    }
    .parkTurretMount {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 36px;
    }
    .parkTurretBarrelPivot {
      position: absolute;
      left: 50%;
      bottom: 12px;
      width: 72%;
      height: 80%;
      margin-left: -36%;
      transform: rotate(0deg);
      transform-origin: 50% 100%;
      transition: transform var(--park-turret-aim, 200ms) cubic-bezier(0.34, 0.72, 0.24, 1);
      pointer-events: none;
      will-change: transform;
    }
    .parkTurretBarrelSvg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
    }
    .parkTurretMuzzle {
      position: absolute;
      left: 50%;
      top: 7%;
      width: 3px;
      height: 3px;
      margin: 0;
      transform: translate(-50%, -50%);
      opacity: 0;
      pointer-events: none;
    }
    .parkTurretWheels {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 90%;
      height: 13px;
      margin-left: -45%;
      pointer-events: none;
    }
    .parkTurretWheels svg {
      display: block;
      width: 100%;
      height: 100%;
    }
    /** 炮管填色由 JS buildParkBarrelSvg 按车位颜色写入 */
    .parkChip {
      width: 100%;
      flex: 1;
      min-height: 0;
      border-radius: 8px;
      border: 2px solid rgba(0, 0, 0, 0.12);
      box-shadow: inset 0 -2px rgba(0, 0, 0, 0.1);
      cursor: default;
      animation: none;
      transition: none;
    }
    /** 占领区内色块：略加深于槽底；去掉边框/内阴影避免顶部「白线」 */
    .parkBay-occupied .parkChip {
      border: none !important;
      box-shadow: none !important;
      border-radius: 6px;
    }
    .parkBay-occupied .parkChip.c0 {
      background: linear-gradient(145deg, rgba(255, 107, 107, 0.82), rgba(201, 42, 42, 0.74)) !important;
    }
    .parkBay-occupied .parkChip.c1 {
      background: linear-gradient(145deg, rgba(105, 219, 124, 0.82), rgba(47, 158, 68, 0.74)) !important;
    }
    .parkBay-occupied .parkChip.c2 {
      background: linear-gradient(145deg, rgba(116, 192, 252, 0.82), rgba(25, 113, 194, 0.74)) !important;
    }
    .parkBay-occupied .parkChip.c3 {
      background: linear-gradient(145deg, rgba(255, 212, 59, 0.84), rgba(240, 140, 0, 0.74)) !important;
    }
    .parkBay-occupied .parkChip.c4 {
      background: linear-gradient(145deg, rgba(218, 119, 242, 0.8), rgba(156, 54, 181, 0.72)) !important;
    }
    .parkBay-occupied .parkChip.c5 {
      background: linear-gradient(145deg, rgba(94, 234, 212, 0.82), rgba(13, 148, 136, 0.74)) !important;
    }
    /** 剩余次数在色块下方（车位槽底部） */
    .parkRemainFoot {
      flex: 0 0 auto;
      text-align: center;
      padding: 3px 2px 1px;
      font-weight: 900;
      font-size: clamp(10px, 2.8vw, 13px);
      color: #1e293b;
      line-height: 1.15;
      letter-spacing: -0.02em;
      text-shadow: none;
      animation: none;
      transition: none;
    }
    .parkBay.parkBay-waitTap {
      animation: parkPulse 0.55s ease-in-out infinite;
    }
    @keyframes parkPulse {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.12); }
    }
    .parkGrid.parkGrid-activeTap {
      cursor: pointer;
      outline: 2px dashed rgba(47, 158, 68, 0.55);
      outline-offset: 2px;
      border-radius: 12px;
    }
    .arrowBlock .elimBadge {
      position: absolute;
      right: 3px;
      bottom: 2px;
      min-width: 1.1em;
      padding: 1px 5px;
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.38);
      font-size: 10px;
      font-weight: 900;
      color: #fff;
      line-height: 1.2;
      pointer-events: none;
    }
    /**
     * 子弹主体仍是 bullet.svg；不跟车位色块变色。
     * 飞行中加中性高光/拖影与略大尺寸，否则细条 + 极短时长远看不清轨迹。
     */
    .bulletFxShell {
      position: fixed;
      width: min(30px, 7.5vw);
      height: auto;
      margin: 0;
      z-index: 455;
      pointer-events: none;
      transform: translate(-50%, -50%);
      overflow: visible;
      will-change: left, top;
    }
    .bulletFxShell.bulletFlying {
      width: min(42px, 10.5vw);
    }
    .bulletFxShell img {
      display: block;
      width: 100%;
      height: auto;
      max-height: 6px;
      position: relative;
      z-index: 0;
      filter: none;
    }
    .bulletFxShell.bulletFlying img {
      max-height: 11px;
      animation: bulletFlightGlowPulse 0.14s ease-in-out infinite alternate;
      will-change: filter;
    }
    @keyframes bulletFlightGlowPulse {
      0% {
        filter: saturate(1.06) brightness(1.06)
          drop-shadow(0 0 1px rgba(255, 255, 255, 0.65))
          drop-shadow(0 0 5px rgba(255, 248, 220, 0.55))
          drop-shadow(0 0 12px rgba(255, 235, 180, 0.28));
      }
      100% {
        filter: saturate(1.14) brightness(1.22)
          drop-shadow(0 0 2px rgba(255, 255, 255, 0.85))
          drop-shadow(0 0 8px rgba(255, 252, 235, 0.72))
          drop-shadow(0 0 18px rgba(255, 228, 160, 0.38));
      }
    }
    /** 中性扫光，便于感知位移（非车位语义色） */
    .bulletFxShell.bulletFlying::after {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      width: 32%;
      height: 220%;
      margin-top: -60%;
      margin-left: -4%;
      z-index: 1;
      pointer-events: none;
      border-radius: 45%;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255, 255, 255, 0.06) 42%,
        rgba(255, 255, 255, 0.55) 50%,
        rgba(255, 255, 255, 0.08) 58%,
        transparent 100%
      );
      mix-blend-mode: soft-light;
      opacity: 0.45;
      animation: bulletFlightShineSweep 0.38s linear infinite;
      will-change: transform;
    }
    @keyframes bulletFlightShineSweep {
      0% { transform: translateX(-130%); }
      100% { transform: translateX(320%); }
    }
    .targetWrap.targetToolMode {
      outline: 3px dashed rgba(151, 117, 250, 0.65);
      outline-offset: 4px;
      border-radius: 12px;
    }
    /**
     * 目标被击中：漫画爆炸图 assets/hit-explosion.svg（挂 body + fixed，不被 targetGrid overflow 裁切）
     * 来源：Wikimedia Commons「Explosion-153710 icon.svg」— OpenClipartVectors，CC0。
     * 显示范围约 1.5 个格子边长：尺寸由 JS 按格子 rect×1.5 写入。
     */
    .hitExplosionFx {
      position: fixed;
      left: 0;
      top: 0;
      width: 1px;
      height: 1px;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      pointer-events: none;
      z-index: 458;
      overflow: visible;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hitExplosionFx img.hitExplosionArt {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      transform: scale(0.18);
      opacity: 1;
      animation: hitExplosionSvgPop 0.38s cubic-bezier(0.22, 0.82, 0.35, 1) forwards;
      will-change: transform, opacity, filter;
      filter: saturate(1.18) brightness(1.35)
        drop-shadow(0 0 3px rgba(255, 255, 255, 0.55));
    }
    @keyframes hitExplosionSvgPop {
      0% {
        transform: scale(0.12);
        opacity: 1;
        filter: saturate(1.18) brightness(1.42)
          drop-shadow(0 0 4px rgba(255, 255, 255, 0.65));
      }
      42% {
        transform: scale(1.02);
        opacity: 1;
        filter: saturate(1.12) brightness(1.08)
          drop-shadow(0 0 6px rgba(255, 248, 220, 0.45));
      }
      100% {
        transform: scale(1.12);
        opacity: 0;
        filter: saturate(1) brightness(1)
          drop-shadow(0 0 2px rgba(255, 255, 255, 0));
      }
    }
    /** 被锁定待攻击：边框闪烁 + 轻微脉冲（目标格；占领区每 bay 至多出一发） */
    .tgCell.tgAttackTarget {
      animation: tgAttackPulse 0.36s ease-in-out infinite;
      position: relative;
      z-index: 7;
      pointer-events: none;
      box-shadow:
        inset 0 0 0 2px rgba(255, 255, 255, 0.88),
        inset 0 0 10px rgba(255, 240, 160, 0.45),
        0 0 14px rgba(255, 200, 80, 0.5);
    }
    @keyframes tgAttackPulse {
      0%, 100% { filter: brightness(1); transform: scale(1); }
      50% { filter: brightness(1.18); transform: scale(1.07); }
    }
    /** 爆炸瞬间隐藏彩色块，仅保留 body 上的漫画爆炸图 */
    .tgCell.tgEliminating {
      animation: none;
      position: relative;
      z-index: 8;
      pointer-events: none;
      background: transparent !important;
      box-shadow: none !important;
      opacity: 0;
    }
    .quotaRow {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      gap: 0;
      min-height: 0;
    }
    .slotAd {
      flex-shrink: 0;
      width: 100%;
      height: 40px;
      padding: 0 6px;
      border-radius: 10px;
      border: 0;
      background: linear-gradient(180deg, #51cf66, #2f9e44);
      color: #fff;
      font-weight: 800;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }
    .slotAd:disabled { opacity: .5; cursor: not-allowed; }
    .playShell {
      width: min(96vw, 420px);
      flex: 1;
      min-height: 200px;
      background: rgba(255,255,255,.5);
      border-radius: 18px;
      padding: 8px;
      box-sizing: border-box;
      border: 3px solid rgba(255,255,255,.75);
      box-shadow: 0 6px 20px rgba(0,0,0,.12);
    }
    .playfield {
      position: relative;
      width: 100%;
      margin: 0 auto;
      border-radius: 14px;
      background: #757575;
      box-shadow: inset 0 0 0 2px rgba(0, 0, 0, 0.18);
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    .pfUnderlay {
      position: absolute;
      pointer-events: none;
      box-sizing: border-box;
    }
    /** 整块网格区（含逻辑上的外圈道路格）：绿色；外线灰道叠在上面 */
    .pfUnderlay.pfPark {
      z-index: 0;
      background: linear-gradient(165deg, #aed581 0%, #8bc34a 42%, #7cb342 100%);
      box-shadow: inset 0 0 0 1px rgba(46, 125, 50, 0.35);
    }
    /** 贴着 playfield 四外边 lane 宽的环形车道（与 playfieldMetrics 外边距一致） */
    .pfUnderlay.pfRoad {
      z-index: 1;
      background: linear-gradient(180deg, #bdbdbd 0%, #9e9e9e 52%, #8d8d8d 100%);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.14);
    }
    .arrowBlock {
      position: absolute;
      border-radius: 14px;
      box-sizing: border-box;
      border: 2px solid rgba(255,255,255,.62);
      box-shadow: inset 0 -5px rgba(0,0,0,.22), inset 0 2px rgba(255,255,255,.22), 0 4px 12px rgba(0,0,0,.2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 2;
      transition: transform .04s ease, filter .04s;
    }
    .arrowBlock:active { filter: brightness(1.08); transform: scale(0.98); }
    .arrowBlock.sliding { pointer-events: none; transition: transform .11s cubic-bezier(0.25, 0.8, 0.25, 1); }
    .arrowBlock.elimPulse { animation: elimPulse .225s ease forwards; }
    .arrowBlock.parkingMove {
      z-index: 50;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.28);
    }
    @keyframes parkFailShake {
      0%, 100% { transform: translate(0, 0); }
      30% { transform: translate(-5px, 0); }
      60% { transform: translate(5px, 0); }
    }
    .arrowBlock.parkFail { animation: parkFailShake 0.16s ease; }
    .arrowBlock.bumpHit {
      transition: transform 0.045s ease-out;
    }
    @keyframes collisionSparkBurst {
      0% { transform: translate(-50%, -50%) scale(0.25); opacity: 1; filter: brightness(1.4); }
      55% { opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(2.1); opacity: 0; filter: brightness(1); }
    }
    .collisionSpark {
      position: fixed;
      width: 56px;
      height: 56px;
      margin: 0;
      border-radius: 50%;
      pointer-events: none;
      z-index: 430;
      background: radial-gradient(circle, rgba(255, 255, 245, 0.95) 0%, rgba(255, 210, 90, 0.55) 38%, rgba(255, 140, 60, 0.2) 62%, transparent 72%);
      box-shadow: 0 0 24px rgba(255, 230, 120, 0.85);
      animation: collisionSparkBurst 0.19s ease-out forwards;
    }
    @keyframes elimPulse {
      0% { transform: scale(1); opacity: 1; }
      40% { transform: scale(1.08); opacity: .85; }
      100% { transform: scale(0); opacity: 0; }
    }
    .arrowGlyph {
      font-size: clamp(16px, 5vw, 22px);
      font-weight: 900;
      color: rgba(255,255,255,.95);
      text-shadow: 0 2px 4px rgba(0,0,0,.35);

          '<ellipse cx="14" cy="6" rx="12" ry="5" fill="#546e7a" stroke="#37474f" stroke-width="1"/>' +
          '<ellipse cx="14" cy="6" rx="7.5" ry="3" fill="#90a4ae"/>' +
          '</svg>';
        for (i = 0; i < ap.span; i++) {
          bay = parkGridEl.querySelector('.parkBay[data-slot="' + (ap.slotStart + i) + '"]');
          if (!bay) continue;
          clearParkTurretAimTimerForSlot(ap.slotStart + i);
          bay.innerHTML = '';
          var cxClr;
          for (cxClr = 0; cxClr < COLOR_COUNT; cxClr++) bay.classList.remove('c' + cxClr);
          bay.classList.add('parkBay-occupied', 'c' + ap.color);
          tw = document.createElement('div');
          tw.className = 'parkTurretWrap';
          mount = document.createElement('div');
          mount.className = 'parkTurretMount';
          pivot = document.createElement('div');
          pivot.className = 'parkTurretBarrelPivot';
          pivot.style.transform = 'rotate(0deg)';
          pivot.style.transition =
            'transform ' + PARK_TURRET_AIM_MS + 'ms cubic-bezier(0.34, 0.72, 0.24, 1)';
          pivot.innerHTML = buildParkBarrelSvg(ap.color);
          tMuz = document.createElement('span');
          tMuz.className = 'parkTurretMuzzle';
          tMuz.setAttribute('aria-hidden', 'true');
          pivot.appendChild(tMuz);
          wheels = document.createElement('div');
          wheels.className = 'parkTurretWheels';
          wheels.innerHTML = wheelsSvg;
          mount.appendChild(pivot);
          mount.appendChild(wheels);
          tw.appendChild(mount);
          bay.appendChild(tw);
          chip = document.createElement('div');
          chip.className = 'parkChip c' + ap.color;
          chip.title = '同色射击 · 剩余 ' + ap.remaining + ' 格 · 可点击停车带连击';
          foot = document.createElement('div');
          foot.className = 'parkRemainFoot';
          num = document.createElement('span');
          num.className = 'parkRemain';
          num.textContent = String(ap.remaining);
          foot.appendChild(num);
          bay.appendChild(chip);
          bay.appendChild(foot);
          chip.style.animation = 'none';
          chip.style.transition = 'none';
          foot.style.animation = 'none';
          foot.style.transition = 'none';
          num.style.animation = 'none';
          num.style.transition = 'none';
        }
      }

      function refreshParkGridActiveTapOutline() {
        if (!parkGridEl) return;
        var k,
          hasPaused = false;
        for (k in parkDeliveryPausedBySlot) {
          if (Object.prototype.hasOwnProperty.call(parkDeliveryPausedBySlot, k)) {
            hasPaused = true;
            break;
          }
        }
        if (hasPaused) parkGridEl.classList.add('parkGrid-activeTap');
        else parkGridEl.classList.remove('parkGrid-activeTap');
      }

      function setParkBayWaitTapSlotRange(slotStart, span, on) {
        if (!parkGridEl || slotStart < 0 || span <= 0) return;
        var i, bay;
        for (i = 0; i < span; i++) {
          bay = parkGridEl.querySelector('.parkBay[data-slot="' + (slotStart + i) + '"]');
          if (!bay || !bay.classList.contains('parkBay-occupied')) continue;
          if (on) bay.classList.add('parkBay-waitTap');
          else bay.classList.remove('parkBay-waitTap');
        }
        refreshParkGridActiveTapOutline();
      }

      /** 关卡重置等：去掉全部槽位等待点击样式 */
      function setParkWaitingTap(on) {
        if (!on && parkGridEl) {
          var i, bay;
          for (i = 0; i < MAX_PARK_SLOTS; i++) {
            bay = parkGridEl.querySelector('.parkBay[data-slot="' + i + '"]');
            if (bay) bay.classList.remove('parkBay-waitTap');
          }
          parkGridEl.classList.remove('parkGrid-activeTap');
        }
      }

      function clearParkBays(slotStart, span) {
        if (!parkGridEl || slotStart < 0 || span <= 0) return;
        cancelFlyingBulletsForParkSlots(slotStart, span);
        var i, bay;
        clearParkTurretAimTimersForRange(slotStart, span);
        for (i = 0; i < span; i++) {
          delete parkDeliveryPausedBySlot[slotStart + i];
          clearParkShootPoll(slotStart + i);
        }
        refreshParkGridActiveTapOutline();
        setParkBayWaitTapSlotRange(slotStart, span, false);
        for (i = 0; i < span; i++) {
          bay = parkGridEl.querySelector('.parkBay[data-slot="' + (slotStart + i) + '"]');
          if (!bay) continue;
          bay.innerHTML = '';
          bay.classList.remove('parkBay-occupied', 'parkBay-waitTap');
          var cx;
          for (cx = 0; cx < COLOR_COUNT; cx++) bay.classList.remove('c' + cx);
        }
      }

      /** 子弹起点：优先炮口锚点；否则车位顶边水平中心 */
      function getParkMuzzleScreenPos(slotStart, span) {
        var bays = [];
        var i, bi;
        for (i = 0; i < span; i++) {
          bi = parkGridEl && parkGridEl.querySelector('.parkBay[data-slot="' + (slotStart + i) + '"]');
          if (bi) bays.push(bi);
        }
        if (!bays.length) return null;
        if (span === 1) {
          bi = bays[0];
          var muz = bi.querySelector('.parkTurretMuzzle');
          if (muz) {
            var mr = muz.getBoundingClientRect();
            return { x: (mr.left + mr.right) / 2, y: (mr.top + mr.bottom) / 2 };
          }
        }
        var br0 = bays[0].getBoundingClientRect();
        var brL = bays[bays.length - 1].getBoundingClientRect();
        return {
          x: (br0.left + brL.right) / 2,
          y: (br0.top + brL.top) / 2
        };
      }

      function playHitExplosionOnCell(elCell) {
        if (!elCell || !elCell.getBoundingClientRect) return;
        /** 击中音效（与 svg 爆炸同步；早于 DOM 动画插入，避免 rect 异常时静音） */
        sfxHitRhythmic();
        var r = elCell.getBoundingClientRect();
        var cx = (r.left + r.right) / 2;
        var cy = (r.top + r.bottom) / 2;
        var w = r.width * 1.5;
        var h = r.height * 1.5;
        var ex = document.createElement('div');
        ex.className = 'hitExplosionFx';
        ex.style.left = cx - w / 2 + 'px';
        ex.style.top = cy - h / 2 + 'px';
        ex.style.width = w + 'px';
        ex.style.height = h + 'px';
        var img = document.createElement('img');
        img.className = 'hitExplosionArt';
        img.src = 'assets/hit-explosion.svg';
        img.alt = '';
        img.draggable = false;
        ex.appendChild(img);
        document.body.appendChild(ex);
        window.setTimeout(function () {
          if (ex.parentNode) ex.parentNode.removeChild(ex);
        }, 460);
      }

      /**
       * 开火瞬间后坐力：`rotate(aimDeg)` 后再 `translateY`，沿炮管局部坐标后移（CSS 从左到右先 rotate 再 translate）。
       * 须在已有瞄准角之后调用；与并行瞄准逻辑无关，勿改动 aimParkTurretThenShoot 的 DOM 重查与 setTimeout(0) 调度。
       */
      function playParkTurretRecoil(pivotEl, aimDegDeg) {
        if (!pivotEl || typeof aimDegDeg !== 'number' || isNaN(aimDegDeg)) return;
        var kickPx = 6;
        var snapMs = 11;
        var recoverMs = 42;
        var base = 'rotate(' + aimDegDeg + 'deg)';
        var kicked = base + ' translateY(' + kickPx + 'px)';
        pivotEl.style.transition =
          'transform ' + snapMs + 'ms cubic-bezier(0.34, 1.22, 0.55, 1)';
        pivotEl.style.transform = kicked;
        window.setTimeout(function () {
          if (!pivotEl.parentNode) return;
          pivotEl.style.transition =
            'transform ' + recoverMs + 'ms cubic-bezier(0.34, 0.72, 0.24, 1)';
          pivotEl.style.transform = base;
        }, snapMs);
      }

      /**
       * 屏幕坐标枪口 → 目标格中心；弹体为 assets/bullet.svg。
       * muzzle：{ x, y } 或 null（则立即 onImpact）。
       * bulletRotationDeg：可选；由炮塔瞄准传入时与炮管共用 pivot→目标的方位角（子弹图默认朝 +X）。
       * parkFireSlot：可选；来自中间第几号车位的炮弹，清空车位时中止弹道且不触发 onImpact，避免「格没了还播击中」。
       */
      function cancelFlyingBulletsAllNoImpact() {
        var list = document.querySelectorAll('.bulletFxShell');
        var i, el;
        for (i = 0; i < list.length; i++) {
          el = list[i];
          if (typeof el.__parkBulletAbort === 'function') el.__parkBulletAbort();
        }
      }
      function cancelFlyingBulletsForParkSlots(slotStart, span) {
        var k, sk, list, i, el;
        for (k = 0; k < span; k++) {
          sk = slotStart + k;
          list = document.querySelectorAll('.bulletFxShell[data-bullet-park-slot="' + sk + '"]');
          for (i = 0; i < list.length; i++) {
            el = list[i];
            if (typeof el.__parkBulletAbort === 'function') el.__parkBulletAbort();
          }
        }
      }
      function shootBulletScreen(muzzle, tr, tc, colorIdx, onImpact, bulletRotationDeg, parkFireSlot) {
        var cell = targetGridEl.querySelector('.tgCell[data-r="' + tr + '"][data-c="' + tc + '"]');
        if (!muzzle || cell == null) {
          if (typeof onImpact === 'function') onImpact();
          return;
        }
        var cr = cell.getBoundingClientRect();
        var x2 = (cr.left + cr.right) / 2;
        var y2 = (cr.top + cr.bottom) / 2;
        var dx = x2 - muzzle.x;
        var dy = y2 - muzzle.y;
        var ang =
          typeof bulletRotationDeg === 'number' && !isNaN(bulletRotationDeg)
            ? bulletRotationDeg
            : Math.atan2(dy, dx) * 180 / Math.PI;

        var bull = document.createElement('div');
        bull.className = 'bulletFxShell';
        var img = document.createElement('img');
        img.src = 'assets/bullet.svg';
        img.alt = '';
        bull.appendChild(img);
        bull.classList.add('bulletFlying');
        bull.style.left = muzzle.x + 'px';
        bull.style.top = muzzle.y + 'px';
        bull.style.transition = 'none';
        bull.style.transform = 'translate(-50%, -50%) rotate(' + ang + 'deg)';
        if (typeof parkFireSlot === 'number' && !isNaN(parkFireSlot))
          bull.setAttribute('data-bullet-park-slot', String(parkFireSlot));
        document.body.appendChild(bull);

        var cleanupTimerId = null;
        var finished = false;
        function onFlyTransitionEnd(ev) {
          if (ev.target !== bull) return;
          if (ev.propertyName !== 'left' && ev.propertyName !== 'top') return;
          bull.removeEventListener('transitionend', onFlyTransitionEnd);
          finishBulletImpact(false);
        }
        function finishBulletImpact(fromAbort) {
          if (finished) return;
          finished = true;
          if (cleanupTimerId != null) {
            window.clearTimeout(cleanupTimerId);
            cleanupTimerId = null;
          }
          bull.removeEventListener('transitionend', onFlyTransitionEnd);
          try {
            delete bull.__parkBulletAbort;
          } catch (eAb) {}
          if (bull.parentNode) bull.parentNode.removeChild(bull);
          if (!fromAbort && typeof onImpact === 'function') onImpact();
        }
        bull.__parkBulletAbort = function () {
          finishBulletImpact(true);
        };

        window.requestAnimationFrame(function () {
          window.requestAnimationFrame(function () {
            sfxShoot();
            bull.style.transition = 'left ' + (BULLET_FLY_MS / 1000) + 's linear, top ' + (BULLET_FLY_MS / 1000) + 's linear';
            bull.style.left = x2 + 'px';
            bull.style.top = y2 + 'px';
          });
        });
        bull.addEventListener('transitionend', onFlyTransitionEnd);
        cleanupTimerId = window.setTimeout(function () {
          finishBulletImpact(false);
        }, BULLET_FLY_MS + BULLET_CLEANUP_EXTRA_MS);
      }

      /**
       * 炮口默认朝上；射击前先将炮管转到目标方向（transition 时长见 PARK_TURRET_AIM_MS），再从炮口发射。
       *
       * 【维护要点 — 勿回归】
       * 1) aimAndScheduleFire 内必须按 slotStart / tr / tc 重新 query bay、pivot、cell（多车位并行时 renderTarget 会重建目标格 DOM）。
       * 2) 调度瞄准时用 setTimeout(aimAndScheduleFire, 0)，勿改回双层 requestAnimationFrame（同帧排队过深会导致部分槽位瞄准不执行）。
       * 3) 瞄准期间 pause .parkTurretWrap idle；clear / 发射完毕 resume（见 resumeParkTurretIdleForSlot）。
       * 4) shotDeg / aimDeg 闭包绑定本槽位；parkTurretAimTimerBySlot 按槽隔离。
       *
       * 瞄准瞬间暂停 .parkTurretWrap 的 idle 位移动画，避免测量原点与发射帧错位（尤其左侧车位）。
       * aimDelayMs：可选；同一波多个底行同色目标时传入较短毫秒数以加快射速（仍为单独弹道）。
       * parkBulletOwnerSlot：可选；写入弹道 data-bullet-park-slot，清空该车位 span 时中止飞行（与瞄准用 bay 槽 baySlot 可能不同）。
       */
      function aimParkTurretThenShoot(slotStart, span, tr, tc, colorIdx, onImpact, aimDelayMs, parkBulletOwnerSlot) {
        var bulletTagSlot =
          typeof parkBulletOwnerSlot === 'number' && !isNaN(parkBulletOwnerSlot)
            ? parkBulletOwnerSlot
            : slotStart;
        /** 无预计算角度时用枪口坐标重算（勿与其它车位并行射击共用外层变量，否则 setTimeout 会读到被覆盖的角度） */
        function fireFromMuzzleWithDeg(degOpt) {
          shootBulletScreen(
            getParkMuzzleScreenPos(slotStart, span),
            tr,
            tc,
            colorIdx,
            onImpact,
            degOpt,
            bulletTagSlot
          );
        }
        if (span !== 1 || !parkGridEl || !targetGridEl) {
          fireFromMuzzleWithDeg(undefined);
          return;
        }
        var bay = parkGridEl.querySelector('.parkBay[data-slot="' + slotStart + '"]');
        var pivot = bay && bay.querySelector('.parkTurretBarrelPivot');
        var cell = targetGridEl.querySelector('.tgCell[data-r="' + tr + '"][data-c="' + tc + '"]');
        if (!bay || !pivot || !cell) {
          fireFromMuzzleWithDeg(undefined);
          return;
        }
        function aimAndScheduleFire() {
          var aimMs =
            typeof aimDelayMs === 'number' && !isNaN(aimDelayMs) && aimDelayMs > 0
              ? Math.max(36, Math.min(PARK_TURRET_AIM_MS, aimDelayMs))
              : PARK_TURRET_AIM_MS;
          /** 本槽位新一轮瞄准：取消仅针对该格的待发弹射，不影响其它中间车位 */
          clearParkTurretAimTimerForSlot(slotStart);
          /**
           * 多车位并行射击时，其它格会在瞄准回调运行前/之间调用 renderTarget()，整张目标格 innerHTML 重建。
           * 闭包里的 cell/bay/pivot 引用会变成游离节点，必须先按 tr,tc 与 slot 重新 query，否则会算错方位角。
           */
          var bayNow = parkGridEl.querySelector('.parkBay[data-slot="' + slotStart + '"]');
          var pivotNow = bayNow && bayNow.querySelector('.parkTurretBarrelPivot');
          var cellNow = targetGridEl.querySelector('.tgCell[data-r="' + tr + '"][data-c="' + tc + '"]');
          if (!bayNow || !pivotNow || !cellNow) {
            resumeParkTurretIdleForSlot(slotStart);
            fireFromMuzzleWithDeg(undefined);
            return;
          }
          var wrap = bayNow.querySelector('.parkTurretWrap');
          if (wrap) wrap.style.animationPlayState = 'paused';
          var cr = cellNow.getBoundingClientRect();
          var tx = (cr.left + cr.right) / 2;
          var ty = (cr.top + cr.bottom) / 2;
          var muzEl = bayNow.querySelector('.parkTurretMuzzle');
          if (!muzEl) {
            resumeParkTurretIdleForSlot(slotStart);
            fireFromMuzzleWithDeg(undefined);
            return;
          }
          /**
           * 旋转原点：transform-origin 50% 100%（底边中心）。在 rotate≠0 时不能用 pivot 包围盒推断。
           * 做法：transition 关掉 → 瞬时归零 → getBoundingClientRect 读真实底边中心 → 再用枪口算炮管初始朝向 theta0，
           * aimDeg = thetaT - theta0（相对旋转），避免左侧车位等 offset 链/subpixel 与「假定朝上 +90°」不一致。
           */
          var prevTransition = pivotNow.style.transition;
          var prevTransform = pivotNow.style.transform;
          pivotNow.style.transition = 'none';
          pivotNow.style.transform = 'rotate(0deg)';
          void pivotNow.offsetHeight;
          var pr = pivotNow.getBoundingClientRect();
          if (pr.width < 1 || pr.height < 1) {
            pivotNow.style.transition = prevTransition;
            pivotNow.style.transform = prevTransform;
            resumeParkTurretIdleForSlot(slotStart);
            fireFromMuzzleWithDeg(undefined);
            return;
          }
          var px = (pr.left + pr.right) / 2;
          var py = pr.bottom;
          var mz = muzEl.getBoundingClientRect();
          var mx = (mz.left + mz.right) / 2;
          var my = (mz.top + mz.bottom) / 2;
          var theta0 = Math.atan2(my - py, mx - px);
          var thetaT = Math.atan2(ty - py, tx - px);
          var shotDeg = (thetaT * 180) / Math.PI;
          var aimDeg = ((thetaT - theta0) * 180) / Math.PI;
          aimDeg -= 360 * Math.floor((aimDeg + 180) / 360);
          var transGo =
            prevTransition ||
            'transform ' + aimMs + 'ms cubic-bezier(0.34, 0.72, 0.24, 1)';
          pivotNow.style.transition = transGo;
          pivotNow.style.transform = 'rotate(' + aimDeg + 'deg)';
          /** 闭包绑定槽位 + shotDeg；map 仅存本格 tid，与其它车位隔离 */
          var aimTid = window.setTimeout(function fireThisShot() {
            if (parkTurretAimTimerBySlot[slotStart] !== aimTid) return;
            delete parkTurretAimTimerBySlot[slotStart];
            var bayRec =
              parkGridEl && parkGridEl.querySelector('.parkBay[data-slot="' + slotStart + '"]');
            var pivotRec = bayRec && bayRec.querySelector('.parkTurretBarrelPivot');
            fireFromMuzzleWithDeg(shotDeg);
            if (pivotRec) playParkTurretRecoil(pivotRec, aimDeg);
            resumeParkTurretIdleForSlot(slotStart);
          }, aimMs);
          parkTurretAimTimerBySlot[slotStart] = aimTid;
        }
        /**
         * 多车位同时 shootBulletFromPark 时每人注册两层 rAF，易在同帧排队过深；改用 setTimeout(0)
         * 排到宏任务，避免部分槽位 aimAndScheduleFire 未运行（表现为炮口仍为 0°）。
         */
        window.setTimeout(aimAndScheduleFire, 0);
      }

      /** 调用方先 renderTarget；内部不再 render，以免清掉 tgAttackTarget */
      function shootBulletFromPark(slotStart, span, tr, tc, colorIdx, onImpact, aimDelayMs, parkBulletOwnerSlot) {
        aimParkTurretThenShoot(slotStart, span, tr, tc, colorIdx, onImpact, aimDelayMs, parkBulletOwnerSlot);
      }

      /** 与车位一致：控件矩形顶边水平中心 */
      function getToolMuzzleScreenPos(forEliminate) {
        var el = document.getElementById(forEliminate ? 'btnElim' : 'btnHammer');
        if (!el) return null;
        var r = el.getBoundingClientRect();
        return { x: (r.left + r.right) / 2, y: r.top };
      }

      /** 收集目标格及其周围 8 格内有颜色的格子（边界内） */
      function collectElimMoore3x3HitCells(tr, tc) {
        var hits = [];
        var dr, dc, rr, cc, cval;
        for (dr = -1; dr <= 1; dr++) {
          for (dc = -1; dc <= 1; dc++) {
            rr = tr + dr;
            cc = tc + dc;
            if (rr < 0 || rr >= TR || cc < 0 || cc >= TC) continue;
            cval = target[rr][cc];
            if (cval < 0 || cval >= COLOR_COUNT) continue;
            hits.push({ r: rr, c: cc, col: cval });
          }
        }
        return hits;
      }

      /** 锤子：点击格及其周围两层（Chebyshev 距 ≤2，最多 5×5）内有颜色的格子 */
      function collectHammerTwoRingHitCells(tr, tc) {
        var hits = [];
        var dr, dc, rr, cc, cval;
        for (dr = -2; dr <= 2; dr++) {
          for (dc = -2; dc <= 2; dc++) {
            rr = tr + dr;
            cc = tc + dc;
            if (rr < 0 || rr >= TR || cc < 0 || cc >= TC) continue;
            cval = target[rr][cc];
            if (cval < 0 || cval >= COLOR_COUNT) continue;
            hits.push({ r: rr, c: cc, col: cval });
          }
        }
        return hits;
      }

      /** 消除：3×3（含点击格）；锤子：5×5（含点击格及周围两层） */
      function onTargetGridToolPointerDown(ev) {
        if (locked) return;
        if (!eliminateMode && !hammerMode) return;
        if (ev.button !== undefined && ev.button !== 0) return;
        var cell = ev.target && ev.target.closest && ev.target.closest('.tgCell');
        if (!cell || cell.classList.contains('empty')) return;
        var tr = parseInt(cell.dataset.r, 10);
        var tc = parseInt(cell.dataset.c, 10);
        if (isNaN(tr) || isNaN(tc)) return;
        var col = target[tr][tc];
        if (col < 0 || col >= COLOR_COUNT) return;

        var useElim = eliminateMode;
        if (useElim && elimUses <= 0) return;
        if (!useElim && hammerUses <= 0) return;

        ev.preventDefault();
        locked = true;
        if (useElim) {
          elimUses--;
          var elLeft = document.getElementById('elimLeft');
          if (elLeft) elLeft.textContent = String(elimUses);
        } else {
          hammerUses--;
          var hLeft = document.getElementById('hammerLeft');
          if (hLeft) hLeft.textContent = String(hammerUses);
        }
        eliminateMode = false;
        hammerMode = false;
        syncModes();
        syncHammerBtn();

        var muzzle = getToolMuzzleScreenPos(useElim);
        var hits = useElim ? collectElimMoore3x3HitCells(tr, tc) : collectHammerTwoRingHitCells(tr, tc);

        shootBulletScreen(muzzle, tr, tc, col, function () {
          var i, h, elCell;
          for (i = 0; i < hits.length; i++) {
            h = hits[i];
            elCell = targetGridEl.querySelector('.tgCell[data-r="' + h.r + '"][data-c="' + h.c + '"]');
            if (elCell) {
              playHitExplosionOnCell(elCell);
              elCell.classList.add('tgEliminating');
            }
          }
          window.setTimeout(function () {
            var cleared = 0;
            var j, hj;
            for (j = 0; j < hits.length; j++) {
              hj = hits[j];
              if (target[hj.r][hj.c] === hj.col) {
                target[hj.r][hj.c] = -1;
                cleared++;
              }
            }
            eliminatedCount += cleared;
            applyGravityRefillWithFallAnimation(function () {
              recomputeRemainFromTarget();
              renderQuotaRow();
              updateProgress();
              wakePausedParkSlotsIfReady();
              locked = false;
              checkWinLose();
            });
          }, TG_ELIM_ANIM_MS);
        });
      }

      function drainParkElimQueue() {
        while (parkElimQueue.length) {
          var job = parkElimQueue[0];
          if (getActiveAp(job.slotStart)) break;
          parkElimQueue.shift();
          startParkElimSequence(job.slotStart, job.span, job.color, job.dir, job.quota, function () {
            if (job.onParkElimFinished) job.onParkElimFinished();
            /** 勿在此处 renderBlocksDom：飞车完成后玩家可能已开始下一块的 parkingMove 道路动画，全量重建会打掉正在进行的几何位移，把车瞬移回网格起点。入库前 fly 已 renderBlocksDom，盘面块数据在此期间不变。 */
          });
        }
      }

      function endParkElimSequence(apOpt) {
        var ap = apOpt;
        if (!ap) return;
        var cb = typeof ap.finishCb === 'function' ? ap.finishCb : null;
        deleteActiveAp(ap);
        if (!anyActiveParkDelivery()) locked = false;
        if (typeof cb === 'function') cb(true);
        drainParkElimQueue();
      }

      function runParkElimWave(ap) {
        if (!ap || getActiveAp(ap.slotStart) !== ap) return;
        if (ap.remaining <= 0) {
          clearParkBays(ap.slotStart, ap.span);
          endParkElimSequence(ap);
          return;
        }
        setParkBayWaitTapSlotRange(ap.slotStart, ap.span, false);

        function fireNextBullet() {
          if (!ap || getActiveAp(ap.slotStart) !== ap) return;
          var cur = ap;
          if (cur.remaining <= 0) {
            clearParkBays(cur.slotStart, cur.span);
            endParkElimSequence(ap);
            return;
          }
          var shotColor = cur.color;
          var hi, rc, elCell, tc;
          /** 单车：占领每 bay 至多一发；多槽位并行时每车独立跑 fireNextBullet */
          var rawHits = collectBottomRowSameColor(shotColor, TC);
          var waveCap = Math.min(cur.span, cur.remaining);
          var hits = [];
          for (hi = 0; hi < rawHits.length && hits.length < waveCap; hi++) {
            rc = rawHits[hi];
            tc = rc[1];
            if (
              parkBottomColReserved[tc] !== undefined &&
              parkBottomColReserved[tc] !== cur.slotStart
            ) {
              continue;
            }
            parkBottomColReserved[tc] = cur.slotStart;
            hits.push(rc);
          }
          renderTarget();
          if (!hits.length) {
            paintParkOccupant(cur);
            deleteActiveAp(cur);
            parkDeliveryPausedBySlot[cur.slotStart] = cur;
            setParkBayWaitTapSlotRange(cur.slotStart, cur.span, true);
            if (!anyActiveParkDelivery()) locked = false;
            scheduleParkShootPoll(cur.slotStart);
            drainParkElimQueue();
            return;
          }
          for (hi = 0; hi < hits.length; hi++) {
            rc = hits[hi];
            elCell = targetGridEl.querySelector('.tgCell[data-r="' + rc[0] + '"][data-c="' + rc[1] + '"]');
            if (elCell) elCell.classList.add('tgAttackTarget');
          }
          var batchN = hits.length;
          var multiBottomTargets = batchN > 1;
          var rapidAimMs = multiBottomTargets
            ? Math.max(40, Math.floor(PARK_TURRET_AIM_MS * 0.4))
            : null;
          var waveGapAfterBatch = multiBottomTargets
            ? Math.max(8, Math.floor(BULLET_GAP_MS * 0.32))
            : BULLET_GAP_MS;
          var impactsLeft = batchN;
          function afterBatchImpacts() {
            window.setTimeout(function () {
              if (!getActiveAp(ap.slotStart) || getActiveAp(ap.slotStart) !== ap) return;
              var i2, tr2, tc2;
              for (i2 = 0; i2 < hits.length; i2++) {
                tr2 = hits[i2][0];
                tc2 = hits[i2][1];
                delete parkBottomColReserved[tc2];
                if (target[tr2][tc2] === shotColor) target[tr2][tc2] = -1;
              }
              ap.remaining -= batchN;
              eliminatedCount += batchN;
              scheduleGravityCoalesced(function () {
                if (!getActiveAp(ap.slotStart) || getActiveAp(ap.slotStart) !== ap) return;
                recomputeRemainFromTarget();
                renderQuotaRow();
                updateProgress();
                if (ap.remaining <= 0) {
                  clearParkBays(ap.slotStart, ap.span);
                  endParkElimSequence(ap);
                  return;
                }
                paintParkOccupant(ap);
                window.setTimeout(fireNextBullet, waveGapAfterBatch);
              });
            }, TG_ELIM_ANIM_MS);
          }
          for (hi = 0; hi < hits.length; hi++) {
            rc = hits[hi];
            (function (tr, tc, baySlot, staggerMs, aimQuick) {
              window.setTimeout(function () {
                shootBulletFromPark(
                  baySlot,
                  1,
                  tr,
                  tc,
                  shotColor,
                  function () {
                    if (!getActiveAp(ap.slotStart) || getActiveAp(ap.slotStart) !== ap) return;
                    elCell = targetGridEl.querySelector('.tgCell[data-r="' + tr + '"][data-c="' + tc + '"]');
                    if (elCell) {
                      elCell.classList.remove('tgAttackTarget');
                      playHitExplosionOnCell(elCell);
                      elCell.classList.add('tgEliminating');
                    }
                    impactsLeft--;
                    if (impactsLeft <= 0) afterBatchImpacts();
                  },
                  aimQuick,
                  cur.slotStart
                );
              }, staggerMs);
            })(
              rc[0],
              rc[1],
              cur.slotStart + hi,
              multiBottomTargets ? hi * 16 : 0,
              rapidAimMs
            );
          }
        }

        fireNextBullet();
      }

      function startParkElimSequence(slotStart, span, color, dir, quota, finishCb) {
        var ap = {
          slotStart: slotStart,
          span: span,
          color: color,
          dir: dir,
          remaining: Math.max(0, quota),
          finishCb: typeof finishCb === 'function' ? finishCb : null
        };
        setActiveAp(ap);
        window.setTimeout(function () {
          runParkElimWave(ap);
        }, PARK_TO_ELIM_MS);
      }

      function onParkGridTap(ev) {
        if (locked) return;
        var bay = ev.target.closest('.parkBay-occupied.parkBay-waitTap');
        if (!bay) return;
        var slot = parseInt(bay.dataset.slot, 10);
        if (isNaN(slot)) return;
        var ap = parkDeliveryPausedBySlot[slot];
        if (!ap || ap.remaining <= 0) return;
        ev.preventDefault();
        sfxUiSoft();
        clearParkShootPoll(slot);
        delete parkDeliveryPausedBySlot[slot];
        setActiveAp(ap);
        runParkElimWave(ap);
      }

      /** 由存档 parkSlotExpand 决定解锁几格（2～8），广告每次 +1 */
      function syncParkSlotCountFromState() {
        state.parkSlotExpand = Math.max(0, Math.min(MAX_PARK_SLOTS - 2, state.parkSlotExpand | 0));
        parkSlotCount = Math.min(MAX_PARK_SLOTS, Math.max(2, 2 + state.parkSlotExpand));
      }

      /** 始终 8 列网格，单格尺寸与原先满 8 格时一致；超出解锁数的格显示锁定占位 */
      function applyParkSlotLockVisual() {
        if (!parkGridEl) return;
        var i, bay;
        for (i = 0; i < MAX_PARK_SLOTS; i++) {
          bay = parkGridEl.querySelector('.parkBay[data-slot="' + i + '"]');
          if (!bay) continue;
          if (i < parkSlotCount) bay.classList.remove('parkBay-locked');
          else bay.classList.add('parkBay-locked');
        }
      }

      function buildParkGrid() {
        if (!parkGridEl) return;
        parkGridEl.innerHTML = '';
        parkGridEl.style.gridTemplateColumns = 'repeat(8, minmax(0, 1fr))';
        var i, bay;
        for (i = 0; i < MAX_PARK_SLOTS; i++) {
          bay = document.createElement('div');
          bay.className = 'parkBay';
          bay.dataset.slot = String(i);
          parkGridEl.appendChild(bay);
        }
        applyParkSlotLockVisual();
      }

      function setParkDestGlow(slotStart, w, on) {
        var k, bay;
        for (k = 0; k < w; k++) {
          bay = parkGridEl && parkGridEl.querySelector('.parkBay[data-slot="' + (slotStart + k) + '"]');
          if (bay) {
            if (on) bay.classList.add('destGlow');
            else bay.classList.remove('destGlow');
          }

      function renderQuotaRow() {
        if (!quotaRowEl) return;
        quotaRowEl.innerHTML = '';
        var adBtn = document.createElement('button');
        adBtn.type = 'button';
        adBtn.className = 'slotAd';
        var maxEx = MAX_PARK_SLOTS - 2;

        adBtn.innerHTML = atMax ? '车位已满' : '+1 📺';
        adBtn.title = atMax
          ? '停车位已满（8 格）'
          : '激励广告：解锁 1 个停车位（单格大小不变，最多 8 格）';
        adBtn.id = 'btnInlineAdSlot';
        adBtn.disabled = atMax;
        quotaRowEl.appendChild(adBtn);
        adBtn.addEventListener('click', function () {
          if (adBtn.disabled) return;

        });
