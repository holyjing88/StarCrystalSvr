      }

      function clearOcc() {
        occ = [];
        var r, c;
        for (r = 0; r < BR; r++) {
          var row = [];
          for (c = 0; c < BC; c++) row.push(-1);
          occ.push(row);
        }
      }

      function stampOcc(bid, clearFirst) {
        var b = blocks[bid];
        if (!b || b.gone) return;
        var r, c;
        if (clearFirst) {
          for (r = 0; r < BR; r++) {
            for (c = 0; c < BC; c++) {
              if (occ[r][c] === bid) occ[r][c] = -1;
            }
          }
        }
        for (r = b.r; r < b.r + b.h; r++) {
          for (c = b.c; c < b.c + b.w; c++) {
            if (r >= 0 && r < BR && c >= 0 && c < BC) occ[r][c] = bid;
          }
        }
      }

      function rebuildOcc() {
        clearOcc();
        var i;
        for (i = 0; i < blocks.length; i++) {
          if (!blocks[i].gone) stampOcc(i, false);
        }
      }

      function stampsClearBidOnOcc(o, bid) {
        var r, c;
        for (r = 0; r < BR; r++) {
          for (c = 0; c < BC; c++) {
            if (o[r][c] === bid) o[r][c] = -1;
          }
        }
      }

      function stampsPlaceBidOnOcc(o, bid, r0, c0) {
        var b = blocks[bid];
        var r, c;
        for (r = r0; r < r0 + b.h; r++) {
          for (c = c0; c < c0 + b.w; c++) {
            if (r >= 0 && r < BR && c >= 0 && c < BC) o[r][c] = bid;
          }
        }
      }

      function overlapsOtherInBoardOcc(o, bid, r0, c0) {
        var b = blocks[bid];
        var r, c, id;
        for (r = r0; r < r0 + b.h; r++) {
          for (c = c0; c < c0 + b.w; c++) {
            if (r < 0 || r >= BR || c < 0 || c >= BC) continue;
            id = o[r][c];
            if (id >= 0 && id !== bid) return true;
          }
        }
        return false;
      }

      function rectOverlapsOtherOcc(o, r0, c0, h, w) {
        var r, c, id;
        for (r = r0; r < r0 + h; r++) {
          for (c = c0; c < c0 + w; c++) {
            if (r < 0 || r >= BR || c < 0 || c >= BC) continue;
            id = o[r][c];
            if (id >= 0) return true;
          }
        }
        return false;
      }

      /** 假想块不占 occ，沿 dir 能否-only 停车位直行后踏上道路（与 simulate 停车位阶段一致） */
      function ghostSlideCanReachRoad(r, c, h, w, dir, occ) {
        if (footprintTouchesRoad(r, c, h, w)) return true;
        var dr = DIR_VEC[dir][0];
        var dc = DIR_VEC[dir][1];
        var cr = r;
        var cc = c;
        var guard = 0;
        while (guard++ < BR * BC + 16) {
          var nr = cr + dr;
          var nc = cc + dc;
          if (!rectBoardIntersect(nr, nc, h, w)) return false;
          if (rectOverlapsOtherOcc(occ, nr, nc, h, w)) return false;
          if (footprintTouchesRoad(nr, nc, h, w)) return true;
          if (footprintAllParkingCells(nr, nc, h, w)) {
            cr = nr;
            cc = nc;
            continue;
          }
          return false;
        }
        return false;
      }

      function shuffleSmall(arr, rng) {
        var a = arr.slice();
        var i, j, t;
        for (i = a.length - 1; i > 0; i--) {
          j = Math.floor(rng() * (i + 1));
          t = a[i];
          a[i] = a[j];
          a[j] = t;
        }
        return a;
      }

      /** 箭头只与长边平行：横条仅左右，竖条仅上下，正方形随机选一轴 */
      function dirsParallelToLongEdge(h, w, rng) {
        if (w > h) return shuffleSmall([1, 3], rng);
        if (h > w) return shuffleSmall([0, 2], rng);
        return rng() < 0.5 ? shuffleSmall([0, 2], rng) : shuffleSmall([1, 3], rng);
      }

      function pickEscapingDir(r, c, h, w, occ, rng) {
        var cand = dirsParallelToLongEdge(h, w, rng);
        var i;
        for (i = 0; i < cand.length; i++) {
          if (ghostSlideCanReachRoad(r, c, h, w, cand[i], occ)) return cand[i];
        }
        return -1;
      }

      /** 贪心：反复驶离任意一辆可出站的车；若能清空则布局可解（避免开局死锁） */
      function parkGreedySolvable() {
        var n = blocks.length;
        if (n === 0) return true;
        var taken = [];
        var k;
        for (k = 0; k < n; k++) taken[k] = false;
        var rounds = 0;
        var maxRounds = n * n + 8;
        while (rounds++ < maxRounds) {
          var left = 0;
          for (k = 0; k < n; k++) if (!taken[k]) left++;
          if (left === 0) return true;
          var pick = -1;
          var bid;
          for (bid = 0; bid < n; bid++) {
            if (taken[bid]) continue;
            for (k = 0; k < n; k++) blocks[k].gone = taken[k];
            rebuildOcc();
            if (simulateArrowPath(bid).escaped) {
              pick = bid;
              break;
            }
          }
          for (k = 0; k < n; k++) blocks[k].gone = false;
          rebuildOcc();
          if (pick < 0) return false;
          taken[pick] = true;
        }
        return false;
      }

      function findBlockerBidAt(o, bid, nr, nc, b) {
        var r, c, id;
        for (r = nr; r < nr + b.h; r++) {
          for (c = nc; c < nc + b.w; c++) {
            if (r < 0 || r >= BR || c < 0 || c >= BC) continue;
            id = o[r][c];
            if (id >= 0 && id !== bid) return id;
          }
        }
        return -1;
      }

      function simulateArrowPath(bid) {
        var b = blocks[bid];
        if (!b || b.gone) {
          return { escaped: false, reachedRoad: false, path: [], finalR: 0, finalC: 0, blockerBid: -1, blockedNr: 0, blockedNc: 0, interiorWall: false };
        }
        rebuildOcc();
        var o = [];
        var r, c;
        for (r = 0; r < BR; r++) o.push(occ[r].slice());
        var dr = DIR_VEC[b.dir][0];
        var dc = DIR_VEC[b.dir][1];
        var cr = b.r;
        var cc = b.c;
        var path = [ [cr, cc] ];
        while (true) {
          stampsClearBidOnOcc(o, bid);
          var nr = cr + dr;
          var nc = cc + dc;
          if (overlapsOtherInBoardOcc(o, bid, nr, nc)) {
            var blockerBid = findBlockerBidAt(o, bid, nr, nc, b);
            stampsPlaceBidOnOcc(o, bid, cr, cc);
            return {
              escaped: false,
              reachedRoad: false,
              path: path,
              finalR: cr,
              finalC: cc,
              blockerBid: blockerBid,
              blockedNr: nr,
              blockedNc: nc,
              interiorWall: false
            };
          }
          if (!rectBoardIntersect(nr, nc, b.h, b.w)) {
            stampsPlaceBidOnOcc(o, bid, cr, cc);
            return {
              escaped: false,
              reachedRoad: false,
              path: path,
              finalR: cr,
              finalC: cc,
              blockerBid: -1,
              blockedNr: nr,
              blockedNc: nc,
              interiorWall: true
            };
          }
          var touchesRd = footprintTouchesRoad(nr, nc, b.h, b.w);
          var allPark = footprintAllParkingCells(nr, nc, b.h, b.w);
          if (allPark) {
            stampsPlaceBidOnOcc(o, bid, nr, nc);
            cr = nr;
            cc = nc;
            path.push([cr, cc]);
            continue;
          }
          if (touchesRd) {
            stampsPlaceBidOnOcc(o, bid, nr, nc);
            cr = nr;
            cc = nc;
            path.push([cr, cc]);
            return {
              escaped: true,
              reachedRoad: true,
              path: path,
              finalR: cr,
              finalC: cc,
              blockerBid: -1,
              blockedNr: nr,
              blockedNc: nc,
              interiorWall: false
            };
          }
          stampsPlaceBidOnOcc(o, bid, cr, cc);
          return {
            escaped: false,
            reachedRoad: false,
            path: path,
            finalR: cr,
            finalC: cc,
            blockerBid: -1,
            blockedNr: nr,
            blockedNc: nc,
            interiorWall: true
          };
        }
      }

      function spawnCollisionSpark(screenX, screenY) {
        var sp = document.createElement('div');
        sp.className = 'collisionSpark';
        sp.style.left = screenX + 'px';
        sp.style.top = screenY + 'px';
        document.body.appendChild(sp);
        window.setTimeout(function () {
          if (sp.parentNode) sp.parentNode.removeChild(sp);
        }, 210);
      }

      function midpointBetweenElements(elA, elB) {
        if (!elA || !elB) return null;
        var a = elA.getBoundingClientRect();
        var b = elB.getBoundingClientRect();
        return {
          x: ((a.left + a.right) / 2 + (b.left + b.right) / 2) / 2,
          y: ((a.top + a.bottom) / 2 + (b.top + b.bottom) / 2) / 2
        };
      }

      function bumpTowardDirThenRevert(el, dir, pxAmt, then) {
        if (!el) {
          if (then) then();
          return;
        }
        var dv = DIR_VEC[dir];
        var dx = dv[1] * pxAmt;
        var dy = dv[0] * pxAmt;
        el.classList.add('bumpHit');
        el.style.transition = 'transform 0.04s ease-out';
        el.style.transform = 'translate(' + dx + 'px,' + dy + 'px)';
        window.setTimeout(function () {
          el.style.transition = 'transform 0.07s cubic-bezier(0.34, 1.35, 0.52, 1)';
          el.style.transform = 'translate(0,0)';
          window.setTimeout(function () {
            el.classList.remove('bumpHit');
            el.style.transition = '';
            el.style.transform = '';
            if (then) then();
          }, 80);
        }, 48);
      }

      function playImmediateBlockCollision(bid, blockerBid, dir, done) {
        var el = blockEl(bid);
        var bel = blockerBid >= 0 ? blockEl(blockerBid) : null;
        var mid = midpointBetweenElements(el, bel);
        if (mid) spawnCollisionSpark(mid.x, mid.y);
        sfxBump();
        bumpTowardDirThenRevert(el, dir, BUMP_PX, function () {
          if (bel) {
            bel.classList.add('parkFail');
            window.setTimeout(function () { bel.classList.remove('parkFail'); }, 110);
          }
          if (done) done();
        });
      }

      function playSlideBlockedCollisionThenRevert(bid, sim, el, onDone) {
        var b = blocks[bid];
        if (!b || b.gone) {
          if (onDone) onDone(false);
          return;
        }
        var blockerBid = sim.blockerBid;
        var dir = b.dir;
        var path = sim.path;
        var r0 = path[0][0], c0 = path[0][1];
        var r1 = path[path.length - 1][0], c1 = path[path.length - 1][1];

        function atCrashSite(cb) {
          rebuildOcc();
          syncArrowBlockDomFromModel(bid);
          if (blockerBid >= 0) syncArrowBlockDomFromModel(blockerBid);
          var moverEl = blockEl(bid);
          var bel = blockerBid >= 0 ? blockEl(blockerBid) : null;
          var mid = midpointBetweenElements(moverEl, bel);
          if (mid) spawnCollisionSpark(mid.x, mid.y);
          sfxBump();
          bumpTowardDirThenRevert(moverEl, dir, BUMP_PX * 0.85, function () {
            if (bel) {
              bel.style.transition = 'transform 0.05s ease-out';
              var bd = DIR_VEC[dir];
              bel.style.transform = 'translate(' + (-bd[1] * 5) + 'px,' + (-bd[0] * 5) + 'px)';
              window.setTimeout(function () {
                bel.style.transition = 'transform 0.06s ease-out';
                bel.style.transform = '';
                window.setTimeout(function () {
                  bel.style.transition = '';
                  if (cb) cb();
                }, 65);
              }, 50);
            } else if (cb) cb();
          });
        }

        if (el) el.classList.add('parkingMove');
        animateBlockParkingSeg(bid, r0, c0, r1, c1, dir, function () {
          atCrashSite(function () {
            var backDir = (dir + 2) % 4;
            animateBlockParkingSeg(bid, r1, c1, r0, c0, backDir, function () {
              var hel = blockEl(bid);
              if (hel) hel.classList.remove('parkingMove');
              if (onDone) onDone(false);
            }, true);
          });
        }, false);
      }

      /** 优先占用左侧空位：从左向右找第一段连续 w 个未占用的槽；全无空位时返回 -1 */
      function pickFreeSlotSpan(pref, w) {
        var s, t, ok;
        if (w > parkSlotCount) return -1;
        for (s = 0; s <= parkSlotCount - w; s++) {
          ok = true;
          for (t = 0; t < w; t++) {
            if (slotFilled[s + t]) {
              ok = false;
              break;
            }
          }
          if (ok) return s;
        }
        return -1;
      }

      function playfieldMetrics() {
        var W = playfieldEl.clientWidth;
        if (!W) W = 320;
        var lane = Math.max(8, Math.round(W / (BC + 2)));
        var innerW = (W - 2 * lane) / BC;
        var innerH = innerW;
        var H = 2 * lane + BR * innerH;
        return { W: W, H: H, lane: lane, innerW: innerW, innerH: innerH };
      }

      /**
       * 四周灰色车道几何（与 appendParkingUnderlay 一致）：宽度均为 lane，中心线为 mt/mb/ml/mr。
       */
      function grayRoadLaneMetrics(m) {
        var W = m.W, H = m.H, lane = m.lane;
        var vLeg = Math.max(0, H - 2 * lane);
        return {
          lane: lane,
          W: W,
          H: H,
          mt: lane / 2,
          mb: H - lane / 2,
          ml: lane / 2,
          mr: W - lane / 2,
          top: { left: 0, top: 0, width: W, height: lane },
          bottom: { left: 0, top: H - lane, width: W, height: lane },
          left: { left: 0, top: lane, width: lane, height: vLeg },
          right: { left: W - lane, top: lane, width: lane, height: vLeg },
          innerLeft: lane,
          innerTop: lane,
          innerRight: W - lane,
          innerBottom: H - lane
        };
      }

      /** 点是否落在四条灰道之一的几何中心线上，或顶边整条灰带高度内（含下移对准停车格的竖移段） */
      function pointOnRoadCenterline(cx, cy, rm) {
        var eps = 1.5;
        if (Math.abs(cy - rm.mt) <= eps && cx >= -eps && cx <= rm.W + eps) return true;
        if (Math.abs(cy - rm.mb) <= eps && cx >= -eps && cx <= rm.W + eps) return true;
        if (Math.abs(cx - rm.ml) <= eps && cy >= rm.mt - eps && cy <= rm.mb + eps) return true;
        if (Math.abs(cx - rm.mr) <= eps && cy >= rm.mt - eps && cy <= rm.mb + eps) return true;
        if (cy >= -eps && cy <= rm.lane + eps && cx >= -eps && cx <= rm.W + eps) return true;
        return false;
      }

      function layoutPlayfieldHeight() {
        var m = playfieldMetrics();
        playfieldEl.style.height = m.H + 'px';
      }

      function blockPixelSize(b) {
        var m = playfieldMetrics();
        var g = CELL_PAD * 2;
        return { bw: b.w * m.innerW - g, bh: b.h * m.innerH - g };
      }

      function positionBlockEl(el, b) {
        var m = playfieldMetrics();
        var sz = blockPixelSize(b);
        el.style.left = (m.lane + b.c * m.innerW + CELL_PAD) + 'px';
        el.style.top = (m.lane + b.r * m.innerH + CELL_PAD) + 'px';
        el.style.width = sz.bw + 'px';
        el.style.height = sz.bh + 'px';
      }

      /** 仅同步单个块的 DOM（含箭头），不整盘 innerHTML，避免其它格因全量重建瞬移回旧坐标 */
      function syncArrowBlockDomFromModel(bid) {
        var b = blocks[bid];
        var el = blockEl(bid);
        if (!b || b.gone || !el) return;
        el.style.transition = 'none';
        el.style.transform = '';
        positionBlockEl(el, b);
        applyArrowDirToEl(el, b.dir);
        var g = el.querySelector('.arrowGlyph');
        if (g) g.textContent = ARROW_CHAR[b.dir];
      }

      function travelDimsForBlock(b, m, travelDir) {
        var g = CELL_PAD * 2;
        var maxG = Math.max(b.w, b.h);
        var minG = Math.min(b.w, b.h);
        if (travelDir < 0 || b.w === b.h) {
          return { vw: b.w * m.innerW - g, vh: b.h * m.innerH - g };
        }
        var horiz = travelDir === 1 || travelDir === 3;
        if (horiz) {
          return { vw: maxG * m.innerW - g, vh: minG * m.innerH - g };
        }
        return { vw: minG * m.innerW - g, vh: maxG * m.innerH - g };
      }

      function blockCenterPx(fr, fc, bw, bh, m) {
        var iw = m.innerW, ih = m.innerH, lane = m.lane;
        return {
          cx: lane + fc * iw + (bw * iw) / 2,
          cy: lane + fr * ih + (bh * ih) / 2
        };
      }

      /**
       * 停车位内平移：车身宽高调成与 travelDir 一致，箭头与行驶方向一致。
       * reparkDom=false 时不调用 positionBlockEl（用于多段衔接）；默认 true。
       */
      function animateBlockParkingSeg(bid, fromR, fromC, toR, toC, travelDir, then, reparkDom) {
        var b = blocks[bid];
        var el = blockEl(bid);
        if (!b || b.gone || !el) {
          if (then) then();
          return;
        }
        var m = playfieldMetrics();
        var dim = travelDimsForBlock(b, m, travelDir);
        var vw = dim.vw, vh = dim.vh;
        var p0 = blockCenterPx(fromR, fromC, b.w, b.h, m);
        var p1 = blockCenterPx(toR, toC, b.w, b.h, m);
        var x0 = p0.cx - vw / 2;
        var y0 = p0.cy - vh / 2;
        var x1 = p1.cx - vw / 2;
        var y1 = p1.cy - vh / 2;
        var dx = x1 - x0;
        var dy = y1 - y0;
        var dist = Math.sqrt(dx * dx + dy * dy);
        var dur = Math.max(PARK_SLIDE_MIN_MS, dist / PARK_SLIDE_PX_PER_MS);
        applyArrowDirToEl(el, travelDir);
        el.classList.add('parkingMove');
        el.style.transition = 'none';
        el.style.transform = '';
        el.style.width = vw + 'px';
        el.style.height = vh + 'px';
        el.style.left = x0 + 'px';
        el.style.top = y0 + 'px';
        el.offsetHeight;
        var finished = false;
        function cleanup() {
          if (finished) return;
          finished = true;
          el.removeEventListener('transitionend', onTe);
          window.clearTimeout(fallbackTimer);
          b.r = toR;
          b.c = toC;
          rebuildOcc();
          el.style.transition = 'none';
          el.style.transform = '';
          if (reparkDom !== false) positionBlockEl(el, b);
          if (then) then();
        }
        function onTe(ev) {
          if (ev.target !== el) return;
          if (ev.propertyName !== 'left' && ev.propertyName !== 'top') return;
          cleanup();
        }
        el.addEventListener('transitionend', onTe);
        var fallbackTimer = window.setTimeout(cleanup, dur + PARK_SLIDE_FALLBACK_EXTRA_MS);
        window.requestAnimationFrame(function () {
          window.requestAnimationFrame(function () {
            var durS = (dur / 1000).toFixed(4) + 's';
            el.style.transition = 'left ' + durS + ' linear, top ' + durS + ' linear';
            el.style.left = x1 + 'px';
            el.style.top = y1 + 'px';
          });
        });
      }

      function gridStepToDir(dr, dc) {
        if (dr === -1 && dc === 0) return 0;
        if (dr === 1 && dc === 0) return 2;
        if (dr === 0 && dc === 1) return 1;
        if (dr === 0 && dc === -1) return 3;
        return -1;
      }

      function runParkingPathChain(bid, pathCells, stepIdx, then) {
        if (!pathCells || pathCells.length < 2 || stepIdx >= pathCells.length - 1) {
          if (then) then();
          return;
        }
        var b = blocks[bid];
        var a = pathCells[stepIdx];
        var dest = pathCells[stepIdx + 1];
        var travelDir = gridStepToDir(dest[0] - a[0], dest[1] - a[1]);
        if (travelDir < 0) travelDir = b && !b.gone ? b.dir : 0;
        var reparkLast = stepIdx === pathCells.length - 2;
        animateBlockParkingSeg(bid, a[0], a[1], dest[0], dest[1], travelDir, function () {
          runParkingPathChain(bid, pathCells, stepIdx + 1, then);
        }, reparkLast);
      }

      function applyArrowDirToEl(el, dirIdx) {
        var g = el.querySelector('.arrowGlyph');
        if (g) g.textContent = ARROW_CHAR[dirIdx];
        el.dataset.dir = String(dirIdx);
      }

      function segmentDeltaToDir(dx, dy) {
        if (Math.abs(dx) < 0.25 && Math.abs(dy) < 0.25) return -1;
        if (Math.abs(dx) >= Math.abs(dy)) return dx > 0 ? 1 : 3;
        return dy > 0 ? 2 : 0;
      }

      function escapeExitDirFromSim(sim, b) {
        var p = sim.path;
        if (p.length >= 2) {
          var z = p[p.length - 1], a = p[p.length - 2];
          var dr = z[0] - a[0], dc = z[1] - a[1];
          if (dr === -1 && dc === 0) return 0;
          if (dr === 1 && dc === 0) return 2;
          if (dr === 0 && dc === 1) return 1;
          if (dr === 0 && dc === -1) return 3;
        }
        return b.dir;
      }

      function pushPathVtx(arr, cx, cy) {
        var last = arr[arr.length - 1];
        if (last && Math.abs(last.cx - cx) < 0.08 && Math.abs(last.cy - cy) < 0.08) return;
        arr.push({ cx: cx, cy: cy });
      }

      /**
       * 已在底边道路中心线 (joinX, mb)。先比较到左右竖道中心线 ml / mr 的水平距离，走较近的一侧拐角；
       * 再沿该竖道到顶边 mt，最后横移到目标列 tcx。仅轴对齐段。
       */
      function appendRingBottomToSlotTop(pts, joinX, tcx, ml, mr, mt, mb) {
        var distLeft = joinX - ml;
        var distRight = mr - joinX;
        var useLeft = distLeft <= distRight;
        if (useLeft) {
          pushPathVtx(pts, ml, mb);
          pushPathVtx(pts, ml, mt);
          pushPathVtx(pts, tcx, mt);
        } else {
          pushPathVtx(pts, mr, mb);
          pushPathVtx(pts, mr, mt);
          pushPathVtx(pts, tcx, mt);
        }
      }

      /**
       * 停车场 → 外圈灰道中心线 → 拐角仅直角。
       * 向左/右出库：先水平移到左侧/右侧竖道几何中心线 ml/mr（与当前车身 cy 对齐），再竖直向上到顶边 mt，最后横移到车位列 tcx；不绕底边 mb。
       */
      function computeRoadDeliveryCenters(fr, fc, bw, bh, slotStart, exitDir) {
        var m = playfieldMetrics();
        var rm = grayRoadLaneMetrics(m);
        var iw = m.innerW, ih = m.innerH, lane = m.lane;
        var cx = lane + fc * iw + (bw * iw) / 2;
        var cy = lane + fr * ih + (bh * ih) / 2;
        var col = Math.max(0, Math.min(BC - 1, slotStart));
        var tcx = lane + (col + 0.5) * iw;
        var mt = rm.mt;
        var mb = rm.mb;
        var ml = rm.ml;
        var mr = rm.mr;
        var pts = [];
        pushPathVtx(pts, cx, cy);
        if (exitDir === 0) {
          if (cy > mt + 0.12) pushPathVtx(pts, cx, mt);
          else pts[pts.length - 1] = { cx: cx, cy: mt };
          if (Math.abs(cx - tcx) > 0.25) {
            pushPathVtx(pts, tcx, mt);
            pushPathVtx(pts, tcx, lane);
          } else {
            pts[pts.length - 1] = { cx: tcx, cy: mt };
          }
        } else if (exitDir === 2) {
          if (cy < mb - 0.12) pushPathVtx(pts, cx, mb);
          else pts[pts.length - 1] = { cx: cx, cy: mb };
          appendRingBottomToSlotTop(pts, cx, tcx, ml, mr, mt, mb);
        } else if (exitDir === 1) {
          if (cx < mr - 0.12) pushPathVtx(pts, mr, cy);
          else pts[pts.length - 1] = { cx: mr, cy: cy };
          pushPathVtx(pts, mr, mt);
          pushPathVtx(pts, tcx, mt);
        } else {
          if (cx > ml + 0.12) pushPathVtx(pts, ml, cy);
          else pts[pts.length - 1] = { cx: ml, cy: cy };
          pushPathVtx(pts, ml, mt);
          pushPathVtx(pts, tcx, mt);
        }
        return pts;
      }

      function animateBlockPixelPolyline(bid, centerPts, then) {
        var b = blocks[bid];
        var el = blockEl(bid);
        if (!b || b.gone || !el || !centerPts || centerPts.length < 2) {
          if (then) then();
          return;
        }
        var m = playfieldMetrics();
        var rm = grayRoadLaneMetrics(m);
        var maxG = Math.max(b.w, b.h);
        var minG = Math.min(b.w, b.h);
        var g = CELL_PAD * 2;
        var vw = b.w * m.innerW - g;
        var vh = b.h * m.innerH - g;

        function dimsForTravelNd(nd) {
          if (nd < 0 || b.w === b.h) {
            return { vw: b.w * m.innerW - g, vh: b.h * m.innerH - g };
          }
          var horiz = nd === 1 || nd === 3;
          if (horiz) {
            return { vw: maxG * m.innerW - g, vh: minG * m.innerH - g };
          }
          return { vw: minG * m.innerW - g, vh: maxG * m.innerH - g };
        }

        function applyDimsNatural(cx, cy) {
          vw = b.w * m.innerW - g;
          vh = b.h * m.innerH - g;
          el.style.transition = 'none';
          el.style.width = vw + 'px';
          el.style.height = vh + 'px';
          el.style.left = cx - vw / 2 + 'px';
          el.style.top = cy - vh / 2 + 'px';
        }

        function applyDimsAt(nd, cx, cy) {
          var dim = dimsForTravelNd(nd);
          vw = dim.vw;
          vh = dim.vh;
          el.style.transition = 'none';
          el.style.width = vw + 'px';
          el.style.height = vh + 'px';
          el.style.left = cx - vw / 2 + 'px';
          el.style.top = cy - vh / 2 + 'px';
        }

        function tl(cp) {
          return { x: cp.cx - vw / 2, y: cp.cy - vh / 2 };
        }
        var i = 1;
        var ndFirst = segmentDeltaToDir(centerPts[1].cx - centerPts[0].cx, centerPts[1].cy - centerPts[0].cy);
        var approachFirst =
          !pointOnRoadCenterline(centerPts[0].cx, centerPts[0].cy, rm) &&
          pointOnRoadCenterline(centerPts[1].cx, centerPts[1].cy, rm);
        if (approachFirst) {
          applyDimsNatural(centerPts[0].cx, centerPts[0].cy);
        } else if (ndFirst >= 0) {
          applyDimsAt(ndFirst, centerPts[0].cx, centerPts[0].cy);
          applyArrowDirToEl(el, ndFirst);
        } else {
          el.style.transition = 'none';
          el.style.width = vw + 'px';
          el.style.height = vh + 'px';
          el.style.left = centerPts[0].cx - vw / 2 + 'px';
          el.style.top = centerPts[0].cy - vh / 2 + 'px';
        }
        el.classList.add('parkingMove');
        el.offsetHeight;

        function runSeg() {
          if (i >= centerPts.length) {
            el.style.transition = '';
            el.style.transform = '';
            if (then) then();
            return;
          }

          function startSegmentMotion() {
            var pA = centerPts[i - 1], pB = centerPts[i];
            var nd = segmentDeltaToDir(pB.cx - pA.cx, pB.cy - pA.cy);
            var onRoadA = pointOnRoadCenterline(pA.cx, pA.cy, rm);
            var onRoadB = pointOnRoadCenterline(pB.cx, pB.cy, rm);
            var approachParkingToRoad = !onRoadA && onRoadB;
            if (approachParkingToRoad) {
              applyDimsNatural(pA.cx, pA.cy);
            } else if (nd >= 0) {
              applyDimsAt(nd, pA.cx, pA.cy);
              applyArrowDirToEl(el, nd);
            }
            var p0 = tl(pA);
            var p1 = tl(pB);
            var dist = Math.sqrt((p1.x - p0.x) * (p1.x - p0.x) + (p1.y - p0.y) * (p1.y - p0.y));
            var dur = Math.max(PARK_SLIDE_MIN_MS, dist / PARK_SLIDE_PX_PER_MS);
            var durS = (dur / 1000).toFixed(4) + 's';
            var doneSeg = false;
            function finishSeg() {
              if (doneSeg) return;
              doneSeg = true;
              el.removeEventListener('transitionend', onTe);
              window.clearTimeout(ft);
              var pAs = centerPts[i - 1], pBs = centerPts[i];
              var dSnap = segmentDeltaToDir(pBs.cx - pAs.cx, pBs.cy - pAs.cy);
              if (dSnap >= 0) {
                applyDimsAt(dSnap, pBs.cx, pBs.cy);
                applyArrowDirToEl(el, dSnap);
              }
              i++;
              runSeg();
            }
            function onTe(ev) {
              if (ev.target !== el) return;
              if (ev.propertyName !== 'left' && ev.propertyName !== 'top') return;
              finishSeg();
            }
            el.style.transition = 'none';
            el.style.transform = '';
            el.style.left = p0.x + 'px';
            el.style.top = p0.y + 'px';
            el.offsetHeight;
            el.addEventListener('transitionend', onTe);
            var ft = window.setTimeout(finishSeg, dur + ROAD_SEGMENT_FALLBACK_EXTRA_MS);
            window.requestAnimationFrame(function () {
              window.requestAnimationFrame(function () {
                el.style.transition = 'left ' + durS + ' linear, top ' + durS + ' linear';
                el.style.left = p1.x + 'px';
                el.style.top = p1.y + 'px';
              });
            });
          }

          startSegmentMotion();
        }
        runSeg();
      }

      function runRoadPathThenFly(bid, slotStart, sim, onFlyCommitted, onParkElimFinished) {
        var b = blocks[bid];
        if (!b || b.gone) {
          flyBlockToSlot(bid, slotStart, onFlyCommitted, onParkElimFinished);
          return;
        }
        var exitDir = escapeExitDirFromSim(sim, b);
        var pts = computeRoadDeliveryCenters(b.r, b.c, b.w, b.h, slotStart, exitDir);
        if (pts.length < 2) {
          flyBlockToSlot(bid, slotStart, onFlyCommitted, onParkElimFinished);
          return;
        }
        animateBlockPixelPolyline(bid, pts, function () {
          flyBlockToSlot(bid, slotStart, onFlyCommitted, onParkElimFinished);
        });
      }

      function flyBlockToSlot(bid, slotStart, onFlyCommitted, onParkElimFinished) {
        var el = blockEl(bid);
        var b = blocks[bid];
        var spanW = 1;
        function glow(on) {
          setParkDestGlow(slotStart, spanW, on);
        }
        function abort(ok) {
          glow(false);
          if (onFlyCommitted) onFlyCommitted(!!ok);
        }
        if (!el || !b || b.gone) {
          abort(false);
          return;
        }
        var br = el.getBoundingClientRect();
        var bay = parkGridEl && parkGridEl.querySelector('.parkBay[data-slot="' + slotStart + '"]');
        if (!bay) {
          abort(false);
          return;
        }
        var tr0 = bay.getBoundingClientRect();

        var vcx = (br.left + br.right) / 2;
        var vcy = (br.top + br.bottom) / 2;
        var bcx = (tr0.left + tr0.right) / 2;
        var bcy = (tr0.top + tr0.bottom) / 2;
        var fdx = bcx - vcx;
        var fdy = bcy - vcy;
        var faceDir = segmentDeltaToDir(fdx, fdy);
        if (faceDir < 0) faceDir = b.dir;
        applyArrowDirToEl(el, faceDir);

        if (b.w !== b.h) {
          var pm = playfieldMetrics();
          var fdim = travelDimsForBlock(b, pm, faceDir);
          var pfR = playfieldEl.getBoundingClientRect();
          var locCx = vcx - pfR.left;
          var locCy = vcy - pfR.top;
          el.style.transition = 'none';
          el.style.width = fdim.vw + 'px';
          el.style.height = fdim.vh + 'px';
          el.style.left = locCx - fdim.vw / 2 + 'px';
          el.style.top = locCy - fdim.vh / 2 + 'px';
        }

        br = el.getBoundingClientRect();
        var tox = (tr0.left + tr0.right) / 2 - br.width / 2;
        var toy = (tr0.top + tr0.bottom) / 2 - br.height / 2;

        /** 与 .parkChip 外框一致（occupied padding 2px）。长方车用 scale(sx,sy) 铺满 tw×th，避免等比缩放留白后被 chip 100% 铺满看成「第二次变大」 */
        var PARK_CHIP_PAD = 2;
        var chipPad2 = PARK_CHIP_PAD * 2;
        var tw = Math.max(1, bay.clientWidth - chipPad2);
        var th = Math.max(1, bay.clientHeight - chipPad2);
        var bw = Math.max(br.width, 1);
        var bh = Math.max(br.height, 1);
        var endSx = tw / bw;
        var endSy = th / bh;

        var flyEase = 'cubic-bezier(0.22, 0.92, 0.28, 1)';
        var flyScaleEase = 'cubic-bezier(0.34, 1.02, 0.44, 1)';
        var flyS = (PARK_FLY_MS / 1000).toFixed(3) + 's';

        var ghost = el.cloneNode(true);
        ghost.classList.remove('parkingMove', 'parkFail');
        /** 飞入中间格时不显示底部块的白色箭头与数字角标 */
        var gAg = ghost.querySelector('.arrowGlyph');
        if (gAg && gAg.parentNode) gAg.parentNode.removeChild(gAg);
        var gEb = ghost.querySelector('.elimBadge');
        if (gEb && gEb.parentNode) gEb.parentNode.removeChild(gEb);
        ghost.style.position = 'fixed';
        ghost.style.left = br.left + 'px';
        ghost.style.top = br.top + 'px';
        ghost.style.width = br.width + 'px';
        ghost.style.height = br.height + 'px';
        ghost.style.margin = '0';
        ghost.style.zIndex = '400';
        ghost.style.pointerEvents = 'none';
        ghost.style.transform = 'scale(1, 1)';
        ghost.style.transformOrigin = '50% 50%';
        ghost.style.willChange = 'left, top, transform, filter';
        ghost.style.filter = 'drop-shadow(0 6px 14px rgba(0, 0, 0, 0.22))';
        ghost.style.setProperty(
          'transition',
          'left ' +
            flyS +
            ' ' +
            flyEase +
            ', top ' +
            flyS +
            ' ' +
            flyEase +
            ', transform ' +
            flyS +
            ' ' +
            flyScaleEase +
            ', filter ' +
            flyS +
            ' ease-out',
          'important'
        );
        document.body.appendChild(ghost);
        el.style.visibility = 'hidden';
        el.style.width = '';
        el.style.height = '';

        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            ghost.style.left = tox + 'px';
            ghost.style.top = toy + 'px';
            ghost.style.transform = 'scale(' + endSx + ', ' + endSy + ')';
            ghost.style.filter = 'drop-shadow(0 3px 8px rgba(0, 0, 0, 0.18))';
          });
        });

        var flyCleaned = false;
        function finishFlyIntoBay() {
          if (flyCleaned) return;
          flyCleaned = true;
          ghost.removeEventListener('transitionend', onFlyTe);
          if (ghost.parentNode) ghost.parentNode.removeChild(ghost);
          var savedColor = b.color;
          var savedQuota =
            typeof b.elimQuota === 'number' ? b.elimQuota : elimShotsForFootprint(b.h, b.w);
          var sd = el && el.dataset ? parseInt(el.dataset.dir, 10) : NaN;
          var savedDir = !isNaN(sd) && sd >= 0 && sd <= 3 ? sd : b.dir;
          stampOcc(bid, true);
          b.gone = true;
          rebuildOcc();
          renderBlocksDom();
          paintParkOccupant({
            slotStart: slotStart,
            span: spanW,
            color: savedColor,
            dir: savedDir,
            remaining: savedQuota
          });
          parkElimQueue.push({
            slotStart: slotStart,
            span: spanW,
            color: savedColor,
            dir: savedDir,
            quota: savedQuota,
            onParkElimFinished: onParkElimFinished
          });
          drainParkElimQueue();
          glow(false);
          if (onFlyCommitted) onFlyCommitted(true);
        }
        function onFlyTe(ev) {
          if (ev.target !== ghost) return;
          if (ev.propertyName !== 'left' && ev.propertyName !== 'top') return;
          finishFlyIntoBay();
        }
        ghost.addEventListener('transitionend', onFlyTe);
        window.setTimeout(finishFlyIntoBay, PARK_FLY_MS + PARK_FLY_FINISH_EXTRA_MS);
      }

      function runArrowSlideDelivery(bid, onDone) {
        var sim = simulateArrowPath(bid);
        var el = blockEl(bid);
        var b = blocks[bid];

        if (!sim.escaped && sim.interiorWall) {
          if (sim.path.length === 1) {
            playImmediateBlockCollision(bid, -1, b.dir, function () {
              if (onDone) onDone(false);
            });
            return;
          }
          if (el) el.classList.add('parkingMove');
          var pi0 = sim.path[0];
          var piN = sim.path[sim.path.length - 1];
          runParkingPathChain(bid, sim.path, 0, function () {
            b.r = sim.finalR;
            b.c = sim.finalC;
            rebuildOcc();
            syncArrowBlockDomFromModel(bid);
            var hel = blockEl(bid);
            if (hel) hel.classList.remove('parkingMove');
            if (onDone) onDone(false);
          });
          return;
        }

        if (!sim.escaped && sim.path.length === 1) {
          playImmediateBlockCollision(bid, sim.blockerBid, b.dir, function () {
            if (onDone) onDone(false);
          });
          return;
        }

        if (!sim.escaped && sim.path.length > 1) {
          if (el) el.classList.add('parkingMove');
          playSlideBlockedCollisionThenRevert(bid, sim, el, onDone);
          return;
        }

        var moved = sim.path.length > 1 || sim.escaped;
        if (!moved) {
          if (onDone) onDone(false);
          return;
        }

        var slotStart = 0;
        var span = 1;
        var pref;
        if (sim.escaped) {
          pref = Math.max(0, Math.min(parkSlotCount - 1, Math.round(b.c + (b.w - 1) / 2)));
          slotStart = pickFreeSlotSpan(pref, 1);
          if (slotStart < 0) {
            playImmediateBlockCollision(bid, -1, b.dir, function () {
              if (onDone) onDone(false);
            });
            return;
          }
          slotFilled[slotStart] = true;
        }

        if (el) el.classList.add('parkingMove');
        if (sim.escaped) setParkDestGlow(slotStart, span, true);

        function releaseSlots() {
          if (!sim.escaped) return;
          slotFilled[slotStart] = false;
        }

        function beginFlyFromFinal() {
          b.r = sim.finalR;
          b.c = sim.finalC;
          rebuildOcc();
          syncArrowBlockDomFromModel(bid);
          runRoadPathThenFly(bid, slotStart, sim, function (ok) {
            if (!ok) releaseSlots();
            var hel = blockEl(bid);
            if (hel) {
              hel.classList.remove('parkingMove');
              hel.style.visibility = '';
            }
            if (ok) stepCounter++;
            updateProgress();
            if (onDone) onDone(!!ok);
          }, function () {
            releaseSlots();
          });
        }

        var p0 = sim.path[0];
        var pN = sim.path[sim.path.length - 1];
        if (p0[0] === pN[0] && p0[1] === pN[1]) {
          beginFlyFromFinal();
          return;
        }
        runParkingPathChain(bid, sim.path, 0, beginFlyFromFinal);
      }

      /** 停车格射击次数：1 格车 10、2 格车 20、≥3 格 30 */
      function elimShotsForFootprint(h, w) {
        var a = Math.max(1, h | 0) * Math.max(1, w | 0);
        if (a <= 1) return 10;
        if (a === 2) return 20;
        return 30;
      }

      /** 微调各车 elimQuota，使总射击次数 = 上方总格子数（与满分消除对齐） */
      function rebalanceElimQuotasToTotal(blocks, targetTotal) {
        if (!blocks.length) return targetTotal === 0;
        var sum = 0,
          i;
        for (i = 0; i < blocks.length; i++) sum += blocks[i].elimQuota;
        var delta = targetTotal - sum;
        if (delta === 0) return true;
        var idx = [];
        for (i = 0; i < blocks.length; i++) idx.push(i);
        idx.sort(function (a, b) {
          return blocks[b].elimQuota - blocks[a].elimQuota;
        });
        var guard = 0;
        while (delta !== 0 && guard++ < 60000) {
          var progressed = false;
          var k, ib;
          for (k = 0; k < idx.length && delta !== 0; k++) {
            ib = idx[k];
            if (delta > 0) {
              blocks[ib].elimQuota++;
              delta--;
              progressed = true;
            } else if (blocks[ib].elimQuota > 1) {
              blocks[ib].elimQuota--;
              delta++;
              progressed = true;
            }
          }
          if (!progressed) {
            if (delta > 0) {
              blocks[idx[0]].elimQuota++;
              delta--;
            } else break;
          }
        }
        return delta === 0;
      }

      /**
       * 逆向着色：各颜色射击次数之和 = remainByColor[c]（上方该色格子数）。
       * 前提：sum(block.elimQuota) === sum_c remainByColor[c] === TR*TC
       * rngOpt：若提供则随机打乱尝试顺序，多次调用可提高可行解命中率
       */
      function assignElimColorsToBlocks(blocks, rb, colorCount, rngOpt) {
        var need = [],
          c;
        for (c = 0; c < COLOR_COUNT; c++) need[c] = c < colorCount ? rb[c] | 0 : 0;
        var sumNeed = 0;
        for (c = 0; c < colorCount; c++) sumNeed += need[c];
        var sumQ = 0,
          bi;
        for (bi = 0; bi < blocks.length; bi++) sumQ += blocks[bi].elimQuota;
        if (sumQ !== sumNeed) return false;
        for (bi = 0; bi < blocks.length; bi++) blocks[bi].color = 0;
        var idxs = [];
        for (bi = 0; bi < blocks.length; bi++) idxs.push(bi);
        if (rngOpt) {
          for (bi = idxs.length - 1; bi > 0; bi--) {
            var jj = Math.floor(rngOpt() * (bi + 1));
            var tmp = idxs[bi];
            idxs[bi] = idxs[jj];
            idxs[jj] = tmp;
          }
        } else {
          idxs.sort(function (a, b) {
            return blocks[b].elimQuota - blocks[a].elimQuota;
          });
        }
        var used = [];
        for (c = 0; c < COLOR_COUNT; c++) used[c] = 0;
        var ii, i, q, bestC, bestSlack, slack;
        for (ii = 0; ii < idxs.length; ii++) {
          i = idxs[ii];
          q = blocks[i].elimQuota;
          bestC = -1;
          bestSlack = 1000000000;
          for (c = 0; c < colorCount; c++) {
            if (need[c] - used[c] < q) continue;
            slack = need[c] - used[c] - q;
            if (slack < bestSlack) {
              bestSlack = slack;
              bestC = c;
            }
          }
          if (bestC < 0) return false;
          blocks[i].color = bestC;
          used[bestC] += q;
        }
        for (c = 0; c < colorCount; c++) {
          if (used[c] !== need[c]) return false;
        }
        return true;
      }

      /**
       * rbRefresh：可选，刷新时用上方 remainByColor 逆向着色（盘面不变）。
       * 不传：新开局，先铺好车并 rebalance 射数再随机着色，按射击分布生成上方格子。
       */
      function packBottom(lv, rbRefresh) {
        var rng = mulberry32((lv * 2246822519 + 3266489917) >>> 0);
        var def = getLevelDef(lv);
        var innerCap = countInnerPlayfieldCells();
        var targetFill = innerCap > 0 ? Math.max(3, Math.floor(innerCap * def.density)) : 0;
        var shapesAll = [ [1, 1], [1, 2], [2, 1] ];
        var shapesBias = [ [1, 2], [2, 1], [1, 1] ];
        var maxRestart = 22;
        var outer;
        for (outer = 0; outer < maxRestart; outer++) {
          blocks = [];
          clearOcc();
          var filled = 0;
          var attempts = 0;
          var stale = 0;
          var fillRatio = outer * 0.03;
          var targetEff = Math.max(4, Math.floor(targetFill * (1 - fillRatio)));
          while (filled < targetEff && attempts < 14000 && stale < 700) {
            attempts++;
            var useBias = filled < targetEff * 0.42 && rng() < 0.62;
            var shapeArr = useBias ? shapesBias : shapesAll;
            var sh = shapeArr[randInt(rng, 0, shapeArr.length - 1)];
            var h = sh[0];
            var w = sh[1];
            if (rng() < 0.48) {
              var ts = h;
              h = w;
              w = ts;
            }
            var r = randInt(rng, 0, BR - h);
            var c = randInt(rng, 0, BC - w);
            var rr, cc;
            var coll = false;
            for (rr = r; rr < r + h; rr++) {
              for (cc = c; cc < c + w; cc++) {
                if (occ[rr][cc] >= 0) {
                  coll = true;
                  break;
                }
              }
              if (coll) break;
            }
            if (coll || !blockIsValidParkingSpawn(r, c, h, w)) {
              stale++;
              continue;
            }
            var dirTry = pickEscapingDir(r, c, h, w, occ, rng);
            if (dirTry < 0) {
              stale++;
              continue;
            }
            var bid = blocks.length;
            var cellArea = h * w;
            var elimQuota = elimShotsForFootprint(h, w);
            blocks.push({
              r: r,
              c: c,
              h: h,
              w: w,
              color: 0,
              dir: dirTry,
              gone: false,
              elimQuota: elimQuota
            });
            for (rr = r; rr < r + h; rr++) {
              for (cc = c; cc < c + w; cc++) occ[rr][cc] = bid;
            }
            if (!parkGreedySolvable()) {
              blocks.pop();
              for (rr = r; rr < r + h; rr++) {
                for (cc = c; cc < c + w; cc++) occ[rr][cc] = -1;
              }
              stale++;
              continue;
            }
            filled += cellArea;
            stale = 0;
          }
          rebuildOcc();
          if (!parkGreedySolvable()) continue;
          if (!rebalanceElimQuotasToTotal(blocks, TR * TC)) continue;
          if (rbRefresh != null) {
            var assignOk = false;
            var ai;
            for (ai = 0; ai < 48; ai++) {
              if (assignElimColorsToBlocks(blocks, rbRefresh, def.colorCount, rng)) {
                assignOk = true;
                break;
              }
            }
            if (!assignOk) continue;
            rebuildOcc();
            return true;
          }
          var bi;
          for (bi = 0; bi < blocks.length; bi++) {
            blocks[bi].color = randInt(rng, 0, def.colorCount - 1);
          }
          var hist = [];
          for (var hc = 0; hc < COLOR_COUNT; hc++) hist[hc] = 0;
          for (bi = 0; bi < blocks.length; bi++) {
            hist[blocks[bi].color] += blocks[bi].elimQuota;
          }
          var tbSync = buildTargetFromShotHistogram(lv, hist, def.colorCount, rng);
          if (!tbSync) continue;
          rebuildOcc();
          return tbSync;
        }
        blocks = [];
        clearOcc();
        var fr = 1,
          fc = 1;
        if (BR > 2 && BC > 2 && blockIsValidParkingSpawn(fr, fc, 1, 1)) {
          blocks.push({
            r: fr,
            c: fc,
            h: 1,
            w: 1,
            color: 0,
            dir: 0,
            gone: false,
            elimQuota: elimShotsForFootprint(1, 1)
          });
          occ[fr][fc] = 0;
        }
        rebuildOcc();
        if (!parkGreedySolvable()) return rbRefresh != null ? false : null;
        if (!rebalanceElimQuotasToTotal(blocks, TR * TC)) {
          blocks = [];
          clearOcc();
          return rbRefresh != null ? false : null;
        }
        if (rbRefresh != null) {
          var assignOk2 = false;
          var aj;
          for (aj = 0; aj < 64; aj++) {
            if (assignElimColorsToBlocks(blocks, rbRefresh, def.colorCount, rng)) {
              assignOk2 = true;
              break;
            }
          }
          if (!assignOk2) {
            blocks = [];
            clearOcc();
            return false;
          }
          rebuildOcc();
          return true;
        }
        var bj;
        for (bj = 0; bj < blocks.length; bj++) {
          blocks[bj].color = randInt(rng, 0, def.colorCount - 1);
        }
        var histD = [];
        for (var hd = 0; hd < COLOR_COUNT; hd++) histD[hd] = 0;
        for (bj = 0; bj < blocks.length; bj++) {
          histD[blocks[bj].color] += blocks[bj].elimQuota;
        }
        var tbDeg = buildTargetFromShotHistogram(lv, histD, def.colorCount, rng);
        if (!tbDeg) {
          blocks = [];
          clearOcc();
          return null;
        }
        rebuildOcc();
        return tbDeg;
      }

        adBusy = true;
        document.getElementById('btnAdSlot').disabled = true;
        document.getElementById('btnHammer').disabled = true;
        var adHm2 = document.getElementById('btnAdHammer');
        if (adHm2) adHm2.disabled = true;
        CrystaBoxH5Ad.setStatus(adEl, '已向宿主请求激励广告…', 'muted');
        window.setTimeout(function () {
          adBusy = false;
          document.getElementById('btnAdSlot').disabled = false;
          var adHm3 = document.getElementById('btnAdHammer');
          if (adHm3) adHm3.disabled = false;
          syncHammerBtn();
        }, 120000);
      }

      document.getElementById('btnAdSlot').addEventListener('click', function () {
        requestAd('slot', 'g001-slot');
      });
      document.getElementById('btnAdHammer').addEventListener('click', function () {
        requestAd('hammer', 'g001-hammer');
      });
      /** 有关卡次数时用锤子；用尽可走激励（requestAd('hammer')） */
      document.getElementById('btnHammer').addEventListener('click', function () {
        if (locked || hammerUses <= 0) return;
        sfxUi();
        hammerMode = true;
        eliminateMode = false;
        if (typeof CrystaBoxH5Ad !== 'undefined' && CrystaBoxH5Ad.setStatus) {
          CrystaBoxH5Ad.setStatus(adEl, '锤击模式：点击上方目标格（5×5）', 'ok');
        }
        syncModes();
      });

      window.addEventListener('resize', function () {
        layoutPlayfieldHeight();
        renderBlocksDom();
      });

      if (parkGridEl) parkGridEl.addEventListener('click', onParkGridTap);
      if (targetGridEl) targetGridEl.addEventListener('pointerdown', onTargetGridToolPointerDown);

      newRound(true);
      /** E2E：?e2e_turret=1 时为中间 8 格各铺一座炮塔（不参与真实停车逻辑，仅用于几何自检） */
      try {
        if (/[?&]e2e_turret=1(?:&|$)/.test(location.search || '')) {
          parkSlotCount = MAX_PARK_SLOTS;
          applyParkSlotLockVisual();
          slotFilled = [];
          for (var e2ei = 0; e2ei < MAX_PARK_SLOTS; e2ei++) slotFilled.push(false);
          var e2eSlot;
          for (e2eSlot = 0; e2eSlot < MAX_PARK_SLOTS; e2eSlot++) {
            paintParkOccupant({
              slotStart: e2eSlot,
              span: 1,
              color: e2eSlot % COLOR_COUNT,
              dir: 0,
              remaining: 20
            });
          }
          window.__parkinglotE2e = {
            aimParkTurretThenShoot: aimParkTurretThenShoot,
            renderTarget: renderTarget
          };
        }
      } catch (eE2eTurret) {}
    })();
  </script>
</body>
</html>
