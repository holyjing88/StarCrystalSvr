# StarCrystal idip-webclient 绿色部署 — 完整 nginx 配置（HTTPS + 80→443）
worker_processes auto;
error_log __NGINX_PREFIX__/logs/error.log warn;
pid __NGINX_PREFIX__/logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       __NGINX_PREFIX__/conf/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 256m;

    upstream starcrystal_api {
        server __API_BACKEND_HOST__:__API_BACKEND_PORT__;
        keepalive 32;
    }

    server {
        listen __HTTP_PORT__ default_server;
        listen [::]:__HTTP_PORT__ default_server;
        server_name _;
        return 301 https://$host__HTTPS_PORT_SUFFIX__$request_uri;
    }

    server {
        listen __HTTPS_PORT__ ssl default_server;
        listen [::]:__HTTPS_PORT__ ssl default_server;
        server_name _;

        ssl_certificate     __SSL_CERT__;
        ssl_certificate_key __SSL_KEY__;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        root __WEB_ROOT__;
        index index.html;

        location /idip/ {
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_pass http://starcrystal_api;
        }

        location /api/ {
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_pass http://starcrystal_api;
        }

        location /healthz {
            proxy_pass http://starcrystal_api;
        }

        location /assets/ {
            try_files $uri @starcrystal_api_assets;
        }
        location @starcrystal_api_assets {
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_pass http://starcrystal_api;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
