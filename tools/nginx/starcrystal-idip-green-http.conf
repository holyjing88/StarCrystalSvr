# StarCrystal idip-webclient 绿色部署 — 完整 nginx 配置（HTTP）
# 用法: nginx -p __NGINX_PREFIX__ -c conf/nginx.conf
worker_processes auto;
error_log __NGINX_PREFIX__/logs/error.log warn;
pid __NGINX_PREFIX__/logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       __NGINX_PREFIX__/conf/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 256m;

    upstream starcrystal_api {
        server __API_BACKEND_HOST__:__API_BACKEND_PORT__;
        keepalive 32;
    }

    server {
        listen __HTTP_PORT__ default_server;
        listen [::]:__HTTP_PORT__ default_server;
        server_name _;

        root __WEB_ROOT__;
        index index.html;

        location /idip/ {
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://starcrystal_api;
        }

        location /api/ {
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://starcrystal_api;
        }

        location /healthz {
            proxy_pass http://starcrystal_api;
        }

        location /assets/ {
            try_files $uri @starcrystal_api_assets;
        }
        location @starcrystal_api_assets {
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://starcrystal_api;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
