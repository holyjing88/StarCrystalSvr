# StarCrystal API 反向代理 → 本机 starcrystalsvr (127.0.0.1:8080)
# 安装: bash tools/scripts/nginx/install-starcrystal-nginx.sh
# release/configs/starcrystal.json 建议 useHttps=true（由 Nginx 终止 TLS 并传 X-Forwarded-Proto）

upstream starcrystal_api {
    server 127.0.0.1:8080;
    keepalive 32;
}

# HTTP：ENABLE_HTTPS=0 时反向代理；ENABLE_HTTPS=1 时由安装脚本改为 301 跳转 HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 32m;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://starcrystal_api;
    }
}

# HTTPS（需证书；安装脚本可生成自签名到 /etc/nginx/ssl/starcrystal.*）
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/starcrystal.crt;
    ssl_certificate_key /etc/nginx/ssl/starcrystal.key;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 32m;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://starcrystal_api;
    }
}
