# StarCrystal H5 小游戏联调 CDN（仅 HTTP）
# 安装: bash tools/scripts/nginx/install-minigame-cdn-nginx.sh
server {
    listen 9090 default_server;
    listen [::]:9090 default_server;
    server_name _;

    root /wwwroot/minigame.starlaneinfinite.com;
    index index.html;

    location ~* ^/h5/.+\.html$ {
        try_files $uri =404;
        add_header Cache-Control "no-store, max-age=0, must-revalidate";
        add_header Pragma "no-cache";
    }

    location /h5/ {
        try_files $uri $uri/ =404;
    }

    location = / {
        default_type text/plain;
        return 200 "ok starcrystal-minigame-cdn (use /h5/...)\n";
    }
}
