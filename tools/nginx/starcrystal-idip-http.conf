# StarCrystal idip-webclient（SPA）+ API 反代（仅 HTTP，云主机初装/无证书）
upstream starcrystal_api {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 256m;

    root /var/www/starcrystal-idip/dist;
    index index.html;

    location /idip/ {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://starcrystal_api;
    }

    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://starcrystal_api;
    }

    location /healthz {
        proxy_pass http://starcrystal_api;
    }

    # SPA 打包在 dist/assets/；未命中时再反代 API 游戏静态资源 /assets/*
    location /assets/ {
        try_files $uri @starcrystal_api_assets;
    }
    location @starcrystal_api_assets {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://starcrystal_api;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
