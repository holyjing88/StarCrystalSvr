# StarCrystal idip-webclient（SPA）+ API 反代（HTTPS）
# 静态：/var/www/starcrystal-idip/dist
# API：127.0.0.1:8080（/idip /api /healthz /assets）
upstream starcrystal_api {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/starcrystal.crt;
    ssl_certificate_key /etc/nginx/ssl/starcrystal.key;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 256m;

    root /var/www/starcrystal-idip/dist;
    index index.html;

    location /idip/ {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://starcrystal_api;
    }

    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://starcrystal_api;
    }

    location /healthz {
        proxy_pass http://starcrystal_api;
    }

    # SPA 打包在 dist/assets/；未命中时再反代 API 游戏静态资源 /assets/*
    location /assets/ {
        try_files $uri @starcrystal_api_assets;
    }
    location @starcrystal_api_assets {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://starcrystal_api;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
